<!doctype html>
<html lang="en" data-palette="azure">
  <head>
    <meta charset="utf-8" />
    <title>AngularMaterialBlockShowcase</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
      rel="stylesheet"
    />
    <script>
      // Apply saved palette + dark class before first paint to avoid FOUC.
      (function () {
        try {
          var p = localStorage.getItem('theme-palette');
          var valid = ['azure','blue','violet','magenta','rose','red','orange','yellow','chartreuse','green','spring-green','cyan'];
          if (p && valid.indexOf(p) !== -1) {
            document.documentElement.setAttribute('data-palette', p);
          }
          var m = localStorage.getItem('theme-mode');
          var isDark = m === 'dark' || (m === 'system' || !m) && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
