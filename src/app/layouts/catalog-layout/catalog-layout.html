<header class="catalog-layout__topbar">
  <div class="catalog-layout__topbar-left">
    <button
      mat-icon-button
      type="button"
      (click)="toggleNav()"
      [matTooltip]="navHidden() ? '顯示側邊欄' : '隱藏側邊欄'"
      [attr.aria-expanded]="!navHidden()"
      aria-controls="catalog-nav"
    >
      <mat-icon>{{ navHidden() ? 'menu' : 'menu_open' }}</mat-icon>
    </button>
    <a class="catalog-layout__brand" routerLink="/catalog">Glacier Analytics · Catalog</a>
  </div>
  <div class="catalog-layout__theme-controls">
    <app-theme-palette-selector />
    <app-theme-toggle />
  </div>
</header>
<!-- Backdrop for mobile overlay -->
<div
  class="catalog-layout__backdrop"
  (click)="hideNav()"
  [attr.aria-hidden]="navHidden()"
></div>
<div class="catalog-layout__content-area">
  <aside id="catalog-nav" class="catalog-layout__nav" aria-label="元件目錄導覽">
    <app-catalog-nav />
  </aside>
  <section class="catalog-layout__body">
    <router-outlet />
  </section>
</div>
