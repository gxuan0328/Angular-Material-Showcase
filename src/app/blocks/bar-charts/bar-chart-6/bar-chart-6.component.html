<div class="mx-auto max-w-3xl">
  <h3 class="text-title-large font-title-large">{{ title }}</h3>
  <p class="text-body-medium text-gray-600 dark:text-gray-400">
    {{ description }}
  </p>

  <div class="mt-6 grid gap-3 grid-cols-1 md:grid-cols-3">
    @for (tab of regionToSeries; track $index) {
    <button
      class="relative rounded-corner-medium border border-outline-variant bg-surface px-4 py-3 text-left"
      matRipple
      (click)="selectedRegion.set(tab[0])"
      [class.ring-2]="selectedRegion() === tab[0]"
      [class.ring-primary]="selectedRegion() === tab[0]"
    >
      <h3 class="text-label-large text-gray-600 dark:text-gray-400">
        {{ tab[0] }}
      </h3>
      <p class="text-title-medium font-semibold">
        {{ getFormattedValue(getTotal(tab[1])) }}
      </p>
    </button>
    }
  </div>

  <div class="mt-8 h-72 relative" #chartImage>
    <div
      #tooltipElement
      [class]="
        'bg-surface rounded-md border border-outline-variant shadow-sm pointer-events-none min-w-40 absolute left-0 top-1 transition-all z-3 ' +
        (tooltip?.opacity === 1 ? 'opacity-100' : 'opacity-0')
      "
      [style.transform]="
        getTooltipTransform(
          tooltip?.caretX ?? 0,
          tooltipElement.offsetWidth,
          chartImage.offsetWidth
        )
      "
    >
      <h3 class="text-body-large font-medium my-2 px-3">
        {{ tooltip?.title?.[0] }}
      </h3>
      <mat-divider class="border-outline-variant!" />
      <div class="p-3">
        @for (item of tooltip?.dataPoints; track item; let i = $index) {
        <div class="flex items-center w-full justify-between gap-x-2">
          <div class="flex items-center space-x-2">
            <span
              class="h-1 w-3 shrink-0 rounded-sm"
              [style.background]="
                  tooltip?.labelColors?.[i]?.borderColor?.toString()
                "
              aria-hidden="true"
            ></span>
            <span class="text-body-medium font-body-small"
              >{{ item?.dataset?.label }}</span
            >
          </div>
          <span class="text-body-medium font-medium text-right"
            >{{ getFormattedValue(item?.raw) }}</span
          >
        </div>
        }
      </div>
    </div>
    <canvas
      baseChart
      [data]="chartData()"
      [options]="chartOptions"
      [type]="'bar'"
    ></canvas>
  </div>
</div>
