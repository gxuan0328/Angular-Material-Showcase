<h3 mat-dialog-title>Pages</h3>
<mat-dialog-content>
  <mat-form-field appearance="outline" class="w-full">
    <input matInput placeholder="Search page..." [(ngModel)]="search" />
  </mat-form-field>

  <div class="flex items-center justify-between pl-3 pr-4 mb-2">
    <p class="text-xs font-medium uppercase tracking-wide">Pages</p>
    <p class="text-xs font-medium uppercase tracking-wide">Visitors</p>
  </div>

  <div class="h-72 overflow-y-auto scrollbar-gutter-stable">
    @if (filteredItems().length) {
    <ngm-dev-block-ui-bar-list
      [data]="filteredItems()"
      [valueFormatter]="valueFormatter()"
    />
    } @else {
    <p class="flex h-full items-center justify-center text-sm">No results.</p>
    }
  </div>
</mat-dialog-content>
