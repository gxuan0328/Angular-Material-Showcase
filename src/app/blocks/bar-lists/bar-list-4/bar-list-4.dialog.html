<h3 mat-dialog-title>Order overview</h3>
<mat-dialog-content>
  <mat-form-field appearance="outline" class="w-full">
    <input matInput placeholder="Search ID..." [(ngModel)]="search" />
  </mat-form-field>
  <div class="flex items-center justify-between pl-4 pr-8">
    <p class="text-xs font-medium uppercase tracking-wide">Open orders</p>
    <p class="text-xs font-medium uppercase tracking-wide">Order date</p>
  </div>
  <div class="h-92 overflow-y-auto scrollbar-gutter-stable">
    @if (filteredItems().length) {
    <mat-nav-list class="density-2">
      @for (item of filteredItems(); track item.name; let last = $last) {
      <a mat-list-item>
        <span matListItemTitle
          >{{ item.name }}
          <span class="tabular-nums float-right">{{ item.date }}</span></span
        >
      </a>
      @if (!last) {
      <mat-divider class="border-outline-variant!" />
      } }
    </mat-nav-list>
    } @else {
    <p class="flex h-full items-center justify-center text-sm">No results.</p>
    }
  </div>
</mat-dialog-content>
