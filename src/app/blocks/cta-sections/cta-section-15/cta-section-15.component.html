<div class="bg-white dark:bg-gray-900">
  <div class="mx-auto max-w-7xl px-6 py-24 sm:py-32 lg:px-8">
    <div class="mx-auto max-w-2xl text-center">
      <h2
        class="text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl dark:text-white"
      >
        Loved by teams worldwide
      </h2>
      <p
        class="mx-auto mt-6 max-w-xl text-lg leading-8 text-gray-600 dark:text-gray-400"
      >
        Join thousands of successful companies using our platform to accelerate
        their growth.
      </p>
    </div>
    <div
      class="mx-auto mt-16 grid max-w-2xl grid-cols-1 gap-8 sm:mt-20 lg:mx-0 lg:max-w-none lg:grid-cols-2"
    >
      @for (testimonial of testimonials; track testimonial.author) {
      <div
        class="flex flex-col justify-between rounded-2xl bg-gray-50 p-8 dark:bg-gray-800"
      >
        <blockquote class="text-lg leading-8 text-gray-900 dark:text-white">
          <p>"{{ testimonial.quote }}"</p>
        </blockquote>
        <figcaption class="mt-6 flex items-center gap-x-4">
          <div
            class="h-10 w-10 rounded-full bg-indigo-600 dark:bg-indigo-500"
          ></div>
          <div>
            <div class="font-semibold text-gray-900 dark:text-white">
              {{ testimonial.author }}
            </div>
            <div class="text-sm text-gray-600 dark:text-gray-400">
              {{ testimonial.role }}
            </div>
          </div>
        </figcaption>
      </div>
      }
    </div>
    <div class="mt-16 flex justify-center">
      <button matButton="filled" class="!px-8">Start your journey</button>
    </div>
  </div>
</div>
