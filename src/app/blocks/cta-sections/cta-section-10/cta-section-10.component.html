<div class="bg-indigo-600 dark:bg-indigo-800">
  <div class="px-6 py-24 sm:px-6 sm:py-32 lg:px-8">
    <div class="mx-auto max-w-4xl text-center">
      <p class="text-base font-semibold leading-7 text-indigo-200">
        Everything you need
      </p>
      <h2 class="mt-2 text-4xl font-bold tracking-tight text-white sm:text-5xl">
        Start building the future today
      </h2>
      <p class="mx-auto mt-6 max-w-2xl text-lg leading-8 text-indigo-100">
        Get access to all premium features with our comprehensive platform
        designed for modern teams.
      </p>
      <div class="mt-10 flex flex-col gap-4 sm:flex-row sm:justify-center">
        <button
          matButton="filled"
          class="!bg-white !text-indigo-600 hover:!bg-indigo-50"
        >
          Start free trial
        </button>
        <button
          matButton="outlined"
          class="!border-white !text-white hover:!bg-white/10"
        >
          Request demo
        </button>
      </div>
      <div
        class="mx-auto mt-16 grid max-w-lg grid-cols-1 gap-6 sm:mt-20 lg:max-w-4xl lg:grid-cols-3"
      >
        @for (feature of features; track feature.icon) {
        <div class="flex flex-col items-center gap-y-3 text-white">
          <mat-icon class="h-8 w-8">{{ feature.icon }}</mat-icon>
          <span class="text-sm font-medium">{{ feature.text }}</span>
        </div>
        }
      </div>
    </div>
  </div>
</div>
