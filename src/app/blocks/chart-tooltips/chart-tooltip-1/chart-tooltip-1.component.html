<div class="mx-auto max-w-7xl">
  <div class="flex justify-center mb-12">
    <div
      class="bg-surface rounded-md border border-outline-variant shadow-sm min-w-40"
    >
      <div class="flex items-center justify-between space-x-4 px-3 py-2">
        <div class="flex items-center space-x-2">
          <span
            class="h-2 w-2 rounded-sm bg-violet-500"
            aria-hidden="true"
          ></span>
          <span class="text-body-medium text-gray-600 dark:text-gray-400"
            >Running</span
          >
        </div>
        <span class="text-body-medium font-medium"> 180 bpm </span>
      </div>
    </div>
  </div>

  <div class="flex justify-center items-center mb-12 gap-x-2">
    <div class="border-t border-outline-variant grow"></div>
    <button matButton="tonal" (click)="toggleDemo()">
      {{ showDemo() ? 'Hide Demo' : 'Show Demo' }}
    </button>
    <div class="border-t border-outline-variant grow"></div>
  </div>

  @if (showDemo()) {
  <div class="h-72 relative" #chartImage>
    <div
      #tooltipElement
      [class]="
          'bg-surface rounded-md border border-outline-variant shadow-sm pointer-events-none min-w-40 absolute left-0 top-1 transition-all z-3 ' +
          (tooltip?.opacity === 1 ? 'opacity-100' : 'opacity-0')
        "
      [style.transform]="
          getTooltipTransform(
            tooltip?.caretX ?? 0,
            tooltipElement.offsetWidth,
            chartImage.offsetWidth
          )
        "
    >
      <div class="flex items-center justify-between space-x-4 px-3 py-2">
        <div class="flex items-center space-x-2">
          <span
            class="h-2 w-2 rounded-sm"
            [style.background]="
                tooltip?.labelColors?.[0]?.borderColor?.toString()
              "
            aria-hidden="true"
          ></span>
          <span class="text-body-medium text-gray-600 dark:text-gray-400"
            >{{ tooltip?.dataPoints?.[0]?.dataset?.label }}</span
          >
        </div>
        <span class="text-body-medium font-medium">
          {{ tooltip?.dataPoints?.[0]?.formattedValue }} bpm
        </span>
      </div>
    </div>

    <canvas
      class="z-2 relative"
      baseChart
      [data]="chartData"
      [options]="chartOptions"
      [type]="chartType"
    ></canvas>
  </div>
  }
</div>
