<!--
	Installed from https://ui.angular-material.dev/
	Update this file using `npx @ngm-dev/cli update chart-tooltips/chart-tooltip-15`
-->

<div class="mx-auto max-w-7xl">
  <div class="flex justify-center mb-12">
    <div
      class="bg-surface rounded-md border border-outline-variant shadow-sm min-w-48 text-body-medium"
    >
      <div class="px-3 py-2 border-b border-outline-variant font-medium">
        May 24
      </div>
      <div class="p-2 space-y-2">
        <div class="flex gap-2 justify-between">
          <div class="flex items-center gap-2">
            <span
              class="w-1 rounded self-stretch bg-blue-500"
              aria-hidden="true"
            ></span>
            <div class="text-gray-600 dark:text-gray-400">Running</div>
          </div>
          <div class="font-medium">165 bpm</div>
        </div>
        <div class="flex gap-2 justify-between">
          <div class="flex items-center gap-2">
            <span
              class="w-1 rounded self-stretch bg-purple-500"
              aria-hidden="true"
            ></span>
            <div class="text-gray-600 dark:text-gray-400">Cycling</div>
          </div>
          <div class="font-medium">145 bpm</div>
        </div>
      </div>
    </div>
  </div>

  <div class="flex justify-center items-center mb-12 gap-x-2">
    <div class="border-t border-outline-variant grow"></div>
    <button matButton="tonal" (click)="toggleDemo()">
      {{ showDemo() ? 'Hide Demo' : 'Show Demo' }}
    </button>
    <div class="border-t border-outline-variant grow"></div>
  </div>

  @if (showDemo()) {
  <div class="h-72 relative" #chartImage>
    <div
      #tooltipElement
      [class]="
          'bg-surface rounded-md border border-outline-variant shadow-sm pointer-events-none min-w-48 absolute left-0 top-1 transition-all z-3 text-body-medium ' +
          (tooltip?.opacity === 1 ? 'opacity-100' : 'opacity-0')
        "
      [style.transform]="
          getTooltipTransform(
            tooltip?.caretX ?? 0,
            tooltipElement.offsetWidth,
            chartImage.offsetWidth
          )
        "
    >
      <div class="px-3 py-2 border-b border-outline-variant font-medium">
        {{ tooltip?.title?.[0] }}
      </div>
      <div class="p-2 space-y-2">
        @for ( point of tooltip?.dataPoints; track point.datasetIndex; let i =
        $index ) {
        <div class="flex gap-2 justify-between">
          <div class="flex items-center gap-2">
            <span
              class="w-1 rounded self-stretch"
              [style.background]="
                    tooltip?.labelColors?.[i]?.borderColor?.toString()
                  "
            ></span>
            <div class="text-gray-600 dark:text-gray-400">
              {{ point?.dataset?.label }}
            </div>
          </div>
          <div class="font-medium">{{ point?.formattedValue }} bpm</div>
        </div>
        }
      </div>
    </div>
    <canvas
      class="z-2 relative"
      baseChart
      [data]="chartData"
      [options]="chartOptions"
      [type]="chartType"
    ></canvas>
  </div>
  }
</div>
