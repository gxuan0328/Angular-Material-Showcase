<!--
	Installed from https://ui.angular-material.dev/
	Update this file using `npx @ngm-dev/cli update chart-tooltips/chart-tooltip-4`
-->

<div class="mx-auto max-w-7xl">
  <div class="flex justify-center mb-12">
    <div
      class="bg-surface rounded-md border border-outline-variant shadow-sm min-w-44 overflow-hidden"
    >
      <div class="px-3 py-2">
        <span class="text-body-medium">Oct 3, 2024</span>
      </div>
      <mat-divider class="border-outline-variant!" />
      <div class="flex items-center gap-x-2 border-b border-outline-variant">
        <span
          class="w-1 shrink-0 self-stretch bg-blue-500"
          aria-hidden="true"
        ></span>
        <div class="flex w-full items-center justify-between pr-3 py-2">
          <span class="text-body-medium text-gray-600 dark:text-gray-400"
            >completed</span
          >
          <div class="text-body-medium">
            <span class="font-medium">45</span>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-x-2 border-b border-outline-variant">
        <span
          class="w-1 shrink-0 self-stretch bg-cyan-500"
          aria-hidden="true"
        ></span>
        <div class="flex w-full items-center justify-between pr-3 py-2">
          <span class="text-body-medium text-gray-600 dark:text-gray-400"
            >in progress</span
          >
          <div class="text-body-medium">
            <span class="font-medium">23</span>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-x-2">
        <span
          class="w-1 shrink-0 self-stretch bg-violet-500"
          aria-hidden="true"
        ></span>
        <div class="flex w-full items-center justify-between pr-3 py-2">
          <span class="text-body-medium text-gray-600 dark:text-gray-400"
            >on hold</span
          >
          <div class="text-body-medium">
            <span class="font-medium">16</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="flex justify-center items-center mb-12 gap-x-2">
    <div class="border-t border-outline-variant grow"></div>
    <button matButton="tonal" (click)="toggleDemo()">
      {{ showDemo() ? 'Hide Demo' : 'Show Demo' }}
    </button>
    <div class="border-t border-outline-variant grow"></div>
  </div>

  @if (showDemo()) {
  <div class="mt-6 h-72 relative" #chartImage>
    <div
      #tooltipElement
      [class]="
          'bg-surface rounded-md border border-outline-variant shadow-sm pointer-events-none min-w-44 absolute left-0 top-1 transition-all z-3 overflow-hidden ' +
          (tooltip?.opacity === 1 ? 'opacity-100' : 'opacity-0')
        "
      [style.transform]="
          getTooltipTransform(
            tooltip?.caretX ?? 0,
            tooltipElement.offsetWidth,
            chartImage.offsetWidth
          )
        "
    >
      <div class="px-3 py-2">
        <span class="text-body-medium">{{ tooltip?.title?.[0] }}</span>
      </div>
      <mat-divider class="border-outline-variant!" />
      @for ( point of tooltip?.dataPoints; track point.datasetIndex; let i =
      $index ) {
      <div
        class="flex items-center gap-x-2 last:border-b-0 border-b border-outline-variant"
      >
        <span
          class="w-1 shrink-0 self-stretch"
          [style.background]="
                tooltip?.labelColors?.[i]?.borderColor?.toString()
              "
          aria-hidden="true"
        ></span>
        <div class="flex w-full items-center justify-between pr-3 py-2">
          <span class="text-body-medium text-gray-600 dark:text-gray-400"
            >{{ point?.dataset?.label }}</span
          >
          <div class="text-body-medium">
            <span class="font-medium">{{ point?.formattedValue }}</span>
          </div>
        </div>
      </div>
      }
    </div>

    <canvas
      class="z-2 relative"
      baseChart
      [data]="chartData"
      [options]="chartOptions"
      [type]="chartType"
    ></canvas>
  </div>
  }
</div>
