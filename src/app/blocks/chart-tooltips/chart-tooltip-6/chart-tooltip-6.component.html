	Update this file using `npx @ngm-dev/cli update chart-tooltips/chart-tooltip-6`
-->

<div class="mx-auto max-w-7xl">
  <div class="flex justify-center mb-12">
    <div
      class="bg-surface rounded-md border border-outline-variant shadow-sm min-w-56"
    >
      <div class="flex items-center justify-between px-3 py-2 gap-x-2">
        <span class="text-body-medium">Jun 24</span>
        <div class="flex items-center gap-x-2">
          <span class="text-body-medium font-medium">$89,342</span>
          <span
            class="rounded px-1.5 py-0.5 text-xs font-medium bg-emerald-100 text-emerald-800 dark:bg-emerald-400/10 dark:text-emerald-500"
          >
            +12.4%
          </span>
        </div>
      </div>
    </div>
  </div>

  <div class="flex justify-center items-center mb-12 gap-x-2">
    <div class="border-t border-outline-variant grow"></div>
    <button matButton="tonal" (click)="toggleDemo()">
      {{ showDemo() ? 'Hide Demo' : 'Show Demo' }}
    </button>
    <div class="border-t border-outline-variant grow"></div>
  </div>

  @if (showDemo()) {
  <div class="mt-6 h-72 relative" #chartImage>
    <div
      #tooltipElement
      [class]="
          'bg-surface rounded-md border border-outline-variant shadow-sm pointer-events-none min-w-56 absolute left-0 top-1 transition-all z-3 ' +
          (tooltip?.opacity === 1 ? 'opacity-100' : 'opacity-0')
        "
      [style.transform]="
          getTooltipTransform(
            tooltip?.caretX ?? 0,
            tooltipElement.offsetWidth,
            chartImage.offsetWidth
          )
        "
    >
      <div class="flex items-center justify-between px-3 py-2 gap-x-2">
        <span class="text-body-medium">{{ tooltip?.title?.[0] }}</span>
        <div class="flex items-center gap-x-2">
          <span class="text-body-medium font-medium"
            >{{ getFormattedValue(tooltip?.dataPoints?.[0]?.raw) }}</span
          >
          @if ( getPercentage(tooltip?.dataPoints?.[0]?.label ?? ''); as
          percentage ) {
          <span
            [class]="
                  'rounded px-1.5 py-0.5 text-xs font-medium ' +
                  (percentage > 0
                    ? 'bg-emerald-100 text-emerald-800 dark:bg-emerald-400/10 dark:text-emerald-500'
                    : 'bg-red-100 text-red-800 dark:bg-red-400/10 dark:text-red-500')
                "
          >
            {{ percentage > 0 ? '+' : '' }} {{ percentage.toFixed(1) }}%
          </span>
          } @else {
          <span
            class="rounded bg-gray-100 px-1.5 py-0.5 text-xs font-medium text-gray-700 dark:bg-gray-900 dark:text-gray-300"
          >
            --
          </span>
          }
        </div>
      </div>
    </div>

    <canvas
      class="z-2 relative"
      baseChart
      [data]="chartData"
      [options]="chartOptions"
      [type]="chartType"
    ></canvas>
  </div>
  }
</div>
