<div class="mx-auto max-w-7xl">
  <div class="flex justify-center mb-12">
    <div
      class="bg-surface rounded-md border border-outline-variant shadow-sm min-w-48 text-body-medium"
    >
      <div class="flex gap-2.5 p-2">
        <span class="w-1 rounded bg-violet-500"></span>
        <div class="flex flex-col">
          <span class="text-gray-700 dark:text-gray-300">Running</span>
          <span class="font-medium">165 bpm</span>
        </div>
      </div>
    </div>
  </div>

  <div class="flex justify-center items-center mb-12 gap-x-2">
    <div class="border-t border-outline-variant grow"></div>
    <button matButton="tonal" (click)="toggleDemo()">
      {{ showDemo() ? 'Hide Demo' : 'Show Demo' }}
    </button>
    <div class="border-t border-outline-variant grow"></div>
  </div>

  @if (showDemo()) {
  <div class="mt-6 h-72 relative" #chartImage>
    <div
      #tooltipElement
      [class]="
          'bg-surface rounded-md border border-outline-variant shadow-sm pointer-events-none min-w-48 absolute left-0 top-1 transition-all z-3 text-body-medium ' +
          (tooltip?.opacity === 1 ? 'opacity-100' : 'opacity-0')
        "
      [style.transform]="
          getTooltipTransform(
            tooltip?.caretX ?? 0,
            tooltipElement.offsetWidth,
            chartImage.offsetWidth
          )
        "
    >
      <div class="flex gap-2.5 p-2">
        <span
          class="w-1 rounded"
          [style.background]="
              tooltip?.labelColors?.[0]?.borderColor?.toString()
            "
        ></span>
        <div class="w-full truncate">
          <div class="font-medium">{{ tooltip?.title?.[0] }}</div>
          <div class="flex items-center justify-between gap-8">
            <span class="truncate text-gray-600 dark:text-gray-400"
              >{{ tooltip?.dataPoints?.[0]?.dataset?.label }}</span
            >
            <span class="font-medium"
              >{{ tooltip?.dataPoints?.[0]?.raw }} bpm</span
            >
          </div>
        </div>
      </div>
    </div>
    <canvas
      class="z-2 relative"
      baseChart
      [data]="chartData"
      [options]="chartOptions"
      [type]="chartType"
    ></canvas>
  </div>
  }
</div>
