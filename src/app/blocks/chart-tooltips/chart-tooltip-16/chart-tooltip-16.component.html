	Installed from https://ui.angular-material.dev/
	Update this file using `npx @ngm-dev/cli update chart-tooltips/chart-tooltip-16`
-->

<div class="mx-auto max-w-7xl">
  <div class="flex justify-center mb-12">
    <div
      class="bg-inverse-surface rounded-md border border-gray-800 dark:border-gray-200 shadow-sm min-w-44 text-body-medium text-inverse-on-surface"
    >
      <div class="px-2 py-1 text-gray-400 dark:text-gray-600">Revenue</div>
      <div class="flex items-center gap-2.5 px-2 pb-1">
        <span
          class="size-2.5 rounded-xs bg-violet-500"
          aria-hidden="true"
        ></span>
        <div class="flex w-full items-center justify-between">
          <span class="font-semibold">$67,830</span>
          <span class="text-emerald-400 dark:text-emerald-700">+12.4%</span>
        </div>
      </div>
    </div>
  </div>

  <div class="flex justify-center items-center mb-12 gap-x-2">
    <div class="border-t border-outline-variant grow"></div>
    <button matButton="tonal" (click)="toggleDemo()">
      {{ showDemo() ? 'Hide Demo' : 'Show Demo' }}
    </button>
    <div class="border-t border-outline-variant grow"></div>
  </div>

  @if (showDemo()) {
  <div class="h-72 relative" #chartImage>
    <div
      #tooltipElement
      [class]="
          'bg-inverse-surface rounded-md border border-gray-800 dark:border-gray-200 shadow-sm pointer-events-none min-w-44 absolute left-0 top-1 transition-all z-3 text-body-medium text-inverse-on-surface ' +
          (tooltip?.opacity === 1 ? 'opacity-100' : 'opacity-0')
        "
      [style.transform]="
          getTooltipTransform(
            tooltip?.caretX ?? 0,
            tooltipElement.offsetWidth,
            chartImage.offsetWidth
          )
        "
    >
      <div class="px-2 py-1 text-gray-400 dark:text-gray-600">Revenue</div>
      <div class="flex items-center gap-2.5 px-2 pb-1">
        <span
          class="size-2.5 rounded-xs"
          [style.background]="
              tooltip?.labelColors?.[0]?.borderColor?.toString()
            "
        ></span>
        <div class="flex w-full items-center justify-between">
          <span class="font-semibold"
            >{{ getFormattedValue(tooltip?.dataPoints?.[0]?.raw) }}</span
          >
          @if ( getPercentage(tooltip?.dataPoints?.[0]?.label ?? ''); as
          percentage ) {
          <span
            [class]="
                  percentage > 0
                    ? 'text-emerald-400 dark:text-emerald-700'
                    : 'text-red-400 dark:text-red-700'
                "
          >
            {{ percentage > 0 ? '+' : '' }}{{ percentage.toFixed(1) }}%
          </span>
          } @else {
          <span class="text-gray-400 dark:text-gray-600"> -- </span>
          }
        </div>
      </div>
    </div>
    <canvas
      class="z-2 relative"
      baseChart
      [data]="chartData"
      [options]="chartOptions"
      [type]="chartType"
    ></canvas>
  </div>
  }
</div>
