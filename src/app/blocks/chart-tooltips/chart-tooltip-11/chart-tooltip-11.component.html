<!--
	Installed from https://ui.angular-material.dev/
	Update this file using `npx @ngm-dev/cli update chart-tooltips/chart-tooltip-11`
-->

<div class="mx-auto max-w-7xl">
  <div class="flex justify-center mb-12">
    <div
      class="bg-surface rounded-md border border-outline-variant shadow-sm min-w-44"
    >
      <div class="flex gap-2.5 px-3 py-2">
        <span class="w-1.5 rounded bg-violet-500"></span>
        <div>
          <div class="text-body-small text-gray-500 dark:text-gray-400">
            Mar 24
          </div>
          <div class="mt-2 text-body-medium font-medium">172 bpm</div>
          <div class="mt-1 flex items-end gap-1">
            <span
              class="text-label-small rounded px-1.5 py-0.5 bg-emerald-100 text-emerald-800 dark:bg-emerald-400/10 dark:text-emerald-500"
            >
              +8.2%
            </span>
            <div class="text-body-small text-gray-500 dark:text-gray-400">
              from prev. month
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="flex justify-center items-center mb-12 gap-x-2">
    <div class="border-t border-outline-variant grow"></div>
    <button matButton="tonal" (click)="toggleDemo()">
      {{ showDemo() ? 'Hide Demo' : 'Show Demo' }}
    </button>
    <div class="border-t border-outline-variant grow"></div>
  </div>

  @if (showDemo()) {
  <div class="mt-6 h-72 relative" #chartImage>
    <div
      #tooltipElement
      [class]="
          'bg-surface rounded-md border border-outline-variant shadow-sm pointer-events-none min-w-44 absolute left-0 top-1 transition-all z-3 ' +
          (tooltip?.opacity === 1 ? 'opacity-100' : 'opacity-0')
        "
      [style.transform]="
          getTooltipTransform(
            tooltip?.caretX ?? 0,
            tooltipElement.offsetWidth,
            chartImage.offsetWidth
          )
        "
    >
      <div class="flex gap-2.5 px-3 py-2">
        <span
          class="w-1.5 rounded"
          [style.background]="
              tooltip?.labelColors?.[0]?.borderColor?.toString()
            "
        ></span>
        <div>
          <div class="text-body-small text-gray-500 dark:text-gray-400">
            {{ tooltip?.title?.[0] }}
          </div>
          <div class="mt-2 text-body-medium font-medium">
            {{ tooltip?.dataPoints?.[0]?.raw }} bpm
          </div>
          <div class="mt-1 flex items-end gap-1">
            @if ( getPercentage(tooltip?.dataPoints?.[0]?.label ?? ''); as
            percentage ) {
            <span
              class="text-label-small rounded px-1.5 py-0.5"
              [class]="
                    percentage > 0
                      ? 'bg-emerald-100 text-emerald-800 dark:bg-emerald-400/10 dark:text-emerald-500'
                      : 'bg-red-100 text-red-800 dark:bg-red-400/10 dark:text-red-500'
                  "
            >
              {{ percentage > 0 ? '+' : '' }}{{ percentage.toFixed(1) }}%</span
            >
            } @else {
            <span
              class="text-label-small rounded bg-gray-100 px-1.5 py-0.5 text-gray-700 dark:bg-gray-900 dark:text-gray-300"
              >--</span
            >
            }
            <div class="text-body-small text-gray-500 dark:text-gray-400">
              from prev. month
            </div>
          </div>
        </div>
      </div>
    </div>
    <canvas
      class="z-2 relative"
      baseChart
      [data]="chartData"
      [options]="chartOptions"
      [type]="chartType"
    ></canvas>
  </div>
  }
</div>
