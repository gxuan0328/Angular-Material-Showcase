<section class="bg-gray-50 py-24 sm:py-32 dark:bg-gray-950">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <div class="mx-auto max-w-4xl text-center">
      <mat-icon class="mx-auto h-12 w-12 text-indigo-600"
        >format_quote</mat-icon
      >
      <blockquote
        class="mt-8 text-2xl font-semibold leading-9 text-gray-900 sm:text-3xl dark:text-white"
      >
        "The platform exceeded all expectations. Our team became 60% more
        efficient within weeks, and the intuitive design meant virtually no
        learning curve. Best investment we've made."
      </blockquote>
      <figcaption class="mt-10">
        <img
          class="mx-auto h-16 w-16 rounded-full object-cover"
          src="https://placehold.co/128x128"
          alt="Robert Chen"
        />
        <div class="mt-4 text-base font-semibold text-gray-900 dark:text-white">
          Robert Chen
        </div>
        <div class="mt-1 text-sm text-gray-600 dark:text-gray-400">
          Director of Operations, EnterpriseHub
        </div>
      </figcaption>
    </div>
    <div
      class="mx-auto mt-20 border-t border-gray-200 pt-16 dark:border-gray-800"
    >
      <h3
        class="text-center text-sm font-semibold uppercase tracking-wider text-gray-600 dark:text-gray-400"
      >
        Trusted by leading companies
      </h3>
      <div
        class="mx-auto mt-10 grid max-w-5xl grid-cols-2 items-center gap-8 sm:grid-cols-3 lg:grid-cols-6"
      >
        @for (company of companies; track company.name) {
        <div class="flex justify-center">
          <img
            class="max-h-12 w-full object-contain grayscale opacity-50 hover:opacity-100 hover:grayscale-0 transition-all"
            [src]="company.logo"
            [alt]="company.name"
          />
        </div>
        }
      </div>
    </div>
  </div>
</section>
