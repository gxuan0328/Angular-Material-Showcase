<section class="bg-white py-24 sm:py-32 dark:bg-gray-900">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <div class="mx-auto max-w-2xl text-center">
      <h2
        class="text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl dark:text-white"
      >
        Hear from our community
      </h2>
      <p class="mt-4 text-lg leading-8 text-gray-600 dark:text-gray-400">
        Thousands of teams trust us to power their most important work.
      </p>
    </div>
    <div
      class="mx-auto mt-16 grid max-w-2xl grid-cols-1 gap-6 sm:mt-20 lg:max-w-none lg:grid-cols-3"
    >
      @for (testimonial of testimonials; track testimonial.author) {
      <div
        class="flex flex-col gap-y-4 rounded-2xl bg-gray-50 p-6 dark:bg-gray-800"
      >
        <div class="flex items-center gap-x-3">
          <img
            class="h-10 w-10 rounded-full object-cover"
            [src]="testimonial.image"
            [alt]="testimonial.author"
          />
          <div class="flex-1">
            <div class="text-sm font-semibold text-gray-900 dark:text-white">
              {{ testimonial.author }}
            </div>
            <div class="text-xs text-gray-600 dark:text-gray-400">
              {{ testimonial.role }}
            </div>
          </div>
          <mat-icon class="h-5 w-5 text-indigo-600">format_quote</mat-icon>
        </div>
        <p class="text-sm leading-6 text-gray-700 dark:text-gray-300">
          {{ testimonial.content }}
        </p>
      </div>
      }
    </div>
  </div>
</section>
