<section class="bg-gray-50 py-24 sm:py-32 dark:bg-gray-950">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <div class="mx-auto max-w-2xl text-center">
      <h2
        class="text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl dark:text-white"
      >
        Trusted by industry leaders
      </h2>
      <p class="mt-4 text-lg leading-8 text-gray-600 dark:text-gray-400">
        See what customers are saying about their experience with our platform.
      </p>
    </div>
    <div
      class="mx-auto mt-16 grid max-w-2xl grid-cols-1 gap-8 sm:mt-20 lg:max-w-none lg:grid-cols-2"
    >
      @for (testimonial of testimonials; track testimonial.author) {
      <div
        class="rounded-2xl bg-white p-8 shadow-sm ring-1 ring-gray-200 dark:bg-gray-900 dark:ring-gray-800"
      >
        <mat-icon class="h-10 w-10 text-indigo-600">format_quote</mat-icon>
        <blockquote
          class="mt-6 text-base leading-7 text-gray-700 dark:text-gray-300"
        >
          {{ testimonial.content }}
        </blockquote>
        <figcaption class="mt-6 flex items-center gap-x-4">
          <img
            class="h-12 w-12 rounded-full object-cover"
            [src]="testimonial.image"
            [alt]="testimonial.author"
          />
          <div>
            <div class="font-semibold text-gray-900 dark:text-white">
              {{ testimonial.author }}
            </div>
            <div class="text-sm text-gray-600 dark:text-gray-400">
              {{ testimonial.role }} at {{ testimonial.company }}
            </div>
          </div>
        </figcaption>
      </div>
      }
    </div>
  </div>
</section>
