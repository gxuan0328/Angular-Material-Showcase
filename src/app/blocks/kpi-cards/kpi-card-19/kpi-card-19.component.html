<div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
  @for (item of data; track item.name) {
  <mat-card class="sm:mx-auto sm:max-w-lg" appearance="outlined">
    <mat-card-content>
      <div class="text-sm">{{ item.name }}</div>
      <div class="mt-2 text-3xl font-semibold">{{ item.currentValue }}</div>
      <div class="mt-1 flex items-baseline justify-between">
        <span class="text-sm"> On {{ item.date }} </span>
        <span
          [class]="
              item.isPositive
                ? 'text-emerald-700 dark:text-emerald-500'
                : 'text-red-700 dark:text-red-500'
            "
          class="rounded-md p-2 text-sm font-medium"
        >
          {{ item.change }}
        </span>
      </div>
      <div class="mt-8 h-20">
        <canvas
          baseChart
          [type]="'line'"
          [data]="item.chartData"
          [options]="chartOptions"
        >
        </canvas>
      </div>
    </mat-card-content>
  </mat-card>
  }
</div>
