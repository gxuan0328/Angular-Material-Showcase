<div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
  @for (item of data; track item.name) {
  <mat-card appearance="outlined">
    <mat-card-content>
      <div class="text-sm font-medium">{{ item.name }}</div>
      <div class="text-3xl font-semibold">{{ item.stat }}</div>
      <div
        class="group relative mt-6 flex items-center space-x-4 rounded-md bg-gray-100/60 p-2 hover:bg-gray-100 dark:bg-gray-800/60 hover:dark:bg-gray-800"
      >
        <div class="flex w-full items-center justify-between truncate">
          <div class="flex items-center space-x-3">
            <span
              [class]="
                  item.status === 'within'
                    ? 'bg-emerald-500 text-white dark:bg-emerald-500'
                    : item.status === 'observe'
                      ? 'bg-yellow-500 text-white dark:bg-yellow-500'
                      : 'bg-red-500 text-white dark:bg-red-500'
                "
              class="flex size-9 shrink-0 items-center justify-center rounded"
            >
              @if (item.status === 'within') {
              <mat-icon class="size-[1em]! text-lg! leading-none! shrink-0"
                >check</mat-icon
              >
              } @else if (item.status === 'observe') {
              <mat-icon
                class="size-[1em]! text-lg! leading-none! shrink-0 icon-filled"
                >visibility</mat-icon
              >
              } @else {
              <mat-icon
                class="size-[1em]! text-lg! leading-none! shrink-0 icon-filled"
                >error</mat-icon
              >
              }
            </span>
            <div>
              <p class="text-sm">
                <a [href]="item.href" class="focus:outline-none">
                  <span class="absolute inset-0" aria-hidden="true"></span>
                  {{ item.goalsAchieved }}/5 goals
                </a>
              </p>
              <p
                [class]="
                    item.status === 'within'
                      ? 'text-emerald-800 dark:text-emerald-500'
                      : item.status === 'observe'
                        ? 'text-yellow-800 dark:text-yellow-500'
                        : 'text-red-800 dark:text-red-500'
                  "
                class="text-sm font-medium"
              >
                {{ item.status }}
              </p>
            </div>
          </div>
          <mat-icon
            class="size-[1em]! text-lg! leading-none! shrink-0 text-gray-400 group-hover:text-gray-500 dark:text-gray-400 group-hover:dark:text-gray-500"
          >
            chevron_right
          </mat-icon>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
  }
</div>
