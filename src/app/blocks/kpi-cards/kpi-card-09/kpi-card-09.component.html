<div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
  @for (item of data; track item.name) {
  <mat-card appearance="outlined">
    <mat-card-content>
      <div class="flex space-x-3">
        <div [class]="item.color" class="w-1 shrink-0 rounded"></div>
        <div
          class="flex w-full items-center justify-between space-x-3 truncate text-sm"
        >
          <span class="truncate">{{ item.name }}</span>
          <span class="font-medium text-gray-600 dark:text-gray-400">
            {{ item.change }}
          </span>
        </div>
      </div>
      <div class="mt-2 pl-4">
        <div class="text-3xl font-semibold">{{ item.stat }}</div>
      </div>
    </mat-card-content>
  </mat-card>
  }
</div>
