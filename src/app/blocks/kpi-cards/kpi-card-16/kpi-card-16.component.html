<div>
  <div class="block sm:flex sm:items-start sm:justify-between sm:space-x-6">
    <div>
      <h3 class="text-lg font-medium">Application scores</h3>
      <p class="mt-1 text-sm/6">
        Monitor your application's performance metrics with real-time scoring
        across key areas.
      </p>
    </div>
    <span
      class="mt-6 inline-flex justify-center space-x-4 whitespace-nowrap rounded-md border border-outline-variant px-2 py-1 text-xs sm:mt-0 sm:w-fit sm:items-center"
    >
      <span tabindex="1" class="flex items-center gap-1.5">
        <span
          aria-hidden="true"
          class="size-2.5 rounded-sm bg-red-600 dark:bg-red-500"
        >
        </span>
        0-50
      </span>
      <span tabindex="1" class="flex items-center gap-1.5">
        <span
          aria-hidden="true"
          class="size-2.5 rounded-sm bg-yellow-600 dark:bg-yellow-500"
        >
        </span>
        50-75
      </span>
      <span tabindex="1" class="flex items-center gap-1.5">
        <span
          aria-hidden="true"
          class="size-2.5 rounded-sm bg-emerald-600 dark:bg-emerald-500"
        >
        </span>
        75-100
      </span>
    </span>
  </div>
  <div class="mt-6 grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
    @for (item of data; track item.name) {
    <mat-card appearance="outlined">
      <mat-card-content>
        <div class="text-sm">{{ item.name }}</div>
        <div class="mt-3 flex items-center justify-between">
          <p class="text-3xl font-medium">
            {{ item.value }}
            <span class="text-base"> /100 </span>
          </p>
          <ngm-dev-block-ui-progress-circle
            [value]="item.value"
            [radius]="25"
            [strokeWidth]="5"
            [variant]="getVariant(item.value)"
          >
            <span class="text-xs font-medium"> {{ item.value }} </span>
          </ngm-dev-block-ui-progress-circle>
        </div>
      </mat-card-content>
    </mat-card>
    }
  </div>
</div>
