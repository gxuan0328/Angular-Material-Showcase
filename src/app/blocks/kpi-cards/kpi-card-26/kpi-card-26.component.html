<div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
  @for (card of cards; track card.title) {
  <mat-card appearance="outlined">
    <mat-card-content>
      <div class="text-sm font-medium">{{ card.title }}</div>
      <div class="mt-4 flex flex-nowrap items-center justify-between gap-y-4">
        <div class="space-y-3">
          @for (item of card.items; track item.label) {
          <div>
            <div class="flex items-center gap-2">
              <span
                [class]="item.color"
                class="size-2.5 shrink-0 rounded-sm"
                aria-hidden="true"
              >
              </span>
              <span class="text-sm"> {{ item.label }} </span>
            </div>
            <span class="mt-1 block text-2xl font-semibold">
              {{ item.value }}
            </span>
          </div>
          }
        </div>
        <ngm-dev-block-ui-progress-circle
          [value]="card.percentage"
          [radius]="45"
          [strokeWidth]="7"
          [variant]="'primary'"
        >
        </ngm-dev-block-ui-progress-circle>
      </div>
    </mat-card-content>
  </mat-card>
  }
</div>
