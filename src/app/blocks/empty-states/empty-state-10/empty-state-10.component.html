<div class="max-w-7xl mx-auto p-4">
  <h3 class="text-xl font-bold">Dashboard</h3>
  <p class="mt-1 text-gray-600 dark:text-gray-400">
    View and analyze current stats about your business
  </p>

  <mat-tab-group class="mt-6" mat-stretch-tabs="false" mat-align-tabs="start">
    <mat-tab label="Overview" />
    <mat-tab label="Detail" />
  </mat-tab-group>

  <div class="relative">
    <ul class="mt-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <li class="h-44 rounded-lg bg-surface-container" role="presentation"></li>
      <li class="h-44 rounded-lg bg-surface-container" role="presentation"></li>
      <li
        class="hidden h-44 rounded-lg bg-surface-container sm:block"
        role="presentation"
      ></li>
      <li
        class="hidden h-44 rounded-lg bg-surface-container sm:block"
        role="presentation"
      ></li>
      <li
        class="hidden h-44 rounded-lg bg-surface-container sm:block"
        role="presentation"
      ></li>
      <li
        class="hidden h-44 rounded-lg bg-surface-container sm:block"
        role="presentation"
      ></li>
    </ul>

    <div
      class="absolute inset-x-0 bottom-0 flex h-32 flex-col items-center justify-center bg-gradient-to-t from-surface to-transparent"
    >
      <p class="font-medium" data-testid="no-reports-message">
        No reports created yet
      </p>
      <p
        class="mt-2 text-gray-600 dark:text-gray-400"
        data-testid="create-report-message"
      >
        Create your first report to get started
      </p>
      <button
        matButton="filled"
        class="mt-6"
        data-testid="create-report-button"
      >
        <mat-icon>add</mat-icon>
        Connect database
      </button>
    </div>
  </div>
</div>
