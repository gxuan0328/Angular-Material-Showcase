<div class="max-w-7xl mx-auto p-4">
  <mat-card appearance="outlined">
    <mat-card-header>
      <mat-card-title>Revenue and profit overview</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p class="mt-2 text-gray-600 dark:text-gray-400">
        Lorem ipsum dolor sit amet, consetetur sadipscing elitr, sed diam nonumy
        eirmod tempor invidunt.
      </p>

      <div class="mt-10 grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-4">
        @for (item of summary; track item.category) {
        <div>
          <div class="flex items-center gap-3">
            <span
              class="w-1 h-6 shrink-0 rounded"
              [style.background-color]="item.color"
              aria-hidden="true"
            ></span>
            <p class="font-semibold">{{ item.total }}</p>
          </div>
          <p class="pl-4 text-gray-600 dark:text-gray-400">
            {{ item.category }}
          </p>
        </div>
        }
      </div>

      <div class="mt-10 h-72">
        <canvas
          baseChart
          [type]="'line'"
          [data]="chartData"
          [options]="chartOptions"
        >
        </canvas>
      </div>
    </mat-card-content>
  </mat-card>
</div>
