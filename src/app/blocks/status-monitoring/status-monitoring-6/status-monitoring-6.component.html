<mat-card appearance="outlined" class="w-full sm:mx-auto sm:max-w-xl">
  <mat-card-content class="space-y-6">
    <div class="flex gap-3">
      <span
        class="w-1 shrink-0 rounded bg-emerald-500"
        aria-hidden="true"
      ></span>
      <div>
        <div class="flex items-center gap-1.5">
          <mat-icon
            class="size-[1em]! text-xl! leading-none! shrink-0 text-emerald-500!"
            >check_circle</mat-icon
          >
          <span class="text-sm font-medium text-emerald-500">
            Operational
          </span>
        </div>
        <h3 class="mt-2 text-lg font-medium">Jordan's Platform</h3>
        <div class="mt-4 flex flex-wrap items-center gap-2">
          <span
            tabindex="0"
            class="inline-flex items-center gap-1.5 rounded-md bg-surface-container px-2.5 py-1 text-xs font-medium text-gray-600 dark:text-gray-400"
          >
            <mat-icon class="-ml-0.5 text-base! size-[1em]! leading-none!"
              >location_on</mat-icon
            >
            US-West 2
          </span>
          <span
            tabindex="0"
            class="inline-flex items-center gap-1.5 rounded-md bg-surface-container px-2.5 py-1 text-xs font-medium text-gray-600 dark:text-gray-400"
          >
            <mat-icon class="-ml-0.5 text-base! size-[1em]! leading-none!"
              >cloud</mat-icon
            >
            Synced
          </span>
          <span
            tabindex="0"
            class="inline-flex items-center gap-1.5 rounded-md bg-surface-container px-2.5 py-1 text-xs font-medium text-gray-600 dark:text-gray-400"
          >
            <mat-icon class="-ml-0.5 text-base! size-[1em]! leading-none!"
              >schedule</mat-icon
            >
            Last run: 07/10/25 15:42
          </span>
        </div>
      </div>
    </div>

    <ngm-dev-block-ui-tracker
      [data]="trackerDataMedium"
      class="mt-6 hidden sm:flex"
    />
    <ngm-dev-block-ui-tracker
      [data]="trackerDataSmall"
      class="mt-6 flex sm:hidden"
    />

    <div
      class="mt-3 flex items-center justify-between text-sm text-gray-600 dark:text-gray-400"
    >
      <span class="hidden sm:block">60 days ago</span>
      <span class="sm:hidden">30 days ago</span>
      <span>Today</span>
    </div>
  </mat-card-content>
</mat-card>
