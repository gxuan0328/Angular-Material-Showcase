<div class="space-y-6">
  <h1 class="text-lg font-semibold">Platform status</h1>
  <p class="text-sm text-gray-600 dark:text-gray-400">
    Last updated on Apr 14 at 11:23am PST
  </p>

  <mat-card appearance="outlined" class="mt-6">
    <mat-card-content>
      <mat-accordion>
        @for (site of sites; track site.name) {
        <mat-expansion-panel class="dark:shadow! dark:shadow-gray-500/50!">
          <mat-expansion-panel-header>
            <mat-panel-title>
              <div class="flex w-full items-center justify-between">
                <span>{{ site.name }}</span>
                <span class="mr-6 flex items-center gap-1">
                  <mat-icon
                    class="text-xl! leading-none! size-[1em]! text-emerald-500!"
                    >check_circle</mat-icon
                  >
                  <span class="text-sm"> Operational </span>
                </span>
              </div>
            </mat-panel-title>
          </mat-expansion-panel-header>

          <div class="mt-6 px-4">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-1.5">
                <mat-icon
                  class="size-[1em]! text-xl! leading-none! shrink-0 text-emerald-500!"
                  >check_circle</mat-icon
                >
                <p class="text-sm font-medium">{{ site.name }}</p>
              </div>
              <p class="text-sm font-medium">99.9% uptime</p>
            </div>

            <ngm-dev-block-ui-tracker
              [data]="trackerData"
              class="mt-4 hidden w-full lg:flex"
            />
            <ngm-dev-block-ui-tracker
              [data]="trackerDataMedium"
              class="mt-3 hidden w-full sm:flex lg:hidden"
            />
            <ngm-dev-block-ui-tracker
              [data]="trackerDataSmall"
              class="mt-3 flex w-full sm:hidden"
            />

            <div
              class="mt-3 flex items-center justify-between text-sm text-gray-600 dark:text-gray-400"
            >
              <span class="hidden lg:block">90 days ago</span>
              <span class="hidden sm:block lg:hidden">60 days ago</span>
              <span class="sm:hidden">30 days ago</span>
              <span>Today</span>
            </div>
          </div>
        </mat-expansion-panel>
        }
      </mat-accordion>
    </mat-card-content>
  </mat-card>
</div>
