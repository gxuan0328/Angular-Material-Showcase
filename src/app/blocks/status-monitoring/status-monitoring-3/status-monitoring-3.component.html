	Update this file using `npx @ngm-dev/cli update status-monitoring/status-monitoring-3`

<mat-card appearance="outlined" class="w-full">
  <mat-card-content class="space-y-6">
    <div class="flex-wrap items-center gap-2 sm:flex">
      <p class="text-sm font-medium">Scanned databases:</p>
      <div class="mt-2 flex flex-wrap items-center gap-2 sm:mt-0">
        <span
          class="rounded px-3 py-1 font-mono text-xs text-gray-600 dark:text-gray-400 ring-1 ring-inset ring-outline-variant"
        >
          user_profiles
        </span>
        <span
          class="rounded px-3 py-1 font-mono text-xs text-gray-600 dark:text-gray-400 ring-1 ring-inset ring-outline-variant"
        >
          inventory_db
        </span>
        <span
          class="rounded px-3 py-1 font-mono text-xs text-gray-600 dark:text-gray-400 ring-1 ring-inset ring-outline-variant"
        >
          analytics_data
        </span>
        <span
          class="rounded px-3 py-1 font-mono text-xs text-gray-600 dark:text-gray-400 ring-1 ring-inset ring-outline-variant"
        >
          dev_env
        </span>
      </div>
    </div>

    <ngm-dev-block-ui-tracker
      [data]="trackerData"
      class="mt-4 hidden w-full lg:flex"
    />
    <ngm-dev-block-ui-tracker
      [data]="trackerDataMedium"
      class="mt-3 hidden w-full sm:flex lg:hidden"
    />
    <ngm-dev-block-ui-tracker
      [data]="trackerDataSmall"
      class="mt-3 flex w-full sm:hidden"
    />

    <div class="mt-6 items-center justify-between sm:flex">
      <div class="flex items-center gap-2">
        <div class="flex items-center gap-2">
          <span
            class="shrink-0 animate-pulse rounded-full bg-emerald-500/30 p-1"
            aria-hidden="true"
          >
            <span class="block size-2 rounded-full bg-emerald-500"></span>
          </span>
          <span class="text-sm font-medium"> Running </span>
        </div>
        <span class="text-sm text-gray-600 dark:text-gray-400">/</span>
        <span class="truncate text-sm text-gray-600 dark:text-gray-400">
          Next run: 2 hours and 15 minutes
        </span>
      </div>
      <a href="#" class="mt-4 block text-sm font-medium text-primary sm:mt-0">
        View more &#8594;
      </a>
    </div>
  </mat-card-content>
</mat-card>
