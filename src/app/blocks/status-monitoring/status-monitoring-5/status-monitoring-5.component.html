<!--
	Installed from https://ui.angular-material.dev/
	Update this file using `npx @ngm-dev/cli update status-monitoring/status-monitoring-5`
-->

<mat-card appearance="outlined" class="w-full">
  <mat-card-content class="space-y-6">
    <div class="flex items-center justify-between">
      <h3 class="font-medium">Riley's App</h3>
      <span
        class="inline-flex shrink-0 items-center gap-2 rounded-full px-3 py-1 text-sm text-gray-600 dark:text-gray-400 ring-1 ring-inset ring-outline-variant"
      >
        <span
          class="-ml-0.5 size-2 rounded-full bg-emerald-500"
          aria-hidden="true"
        ></span>
        Operational
      </span>
    </div>

    <div class="mt-8 flex items-center justify-between">
      <div class="flex items-center gap-1.5">
        <mat-icon
          class="size-[1em]! text-xl! leading-none! shrink-0 text-emerald-500!"
          >check_circle</mat-icon
        >
        <p class="text-sm font-medium">app.io</p>
      </div>
      <p class="text-sm font-medium">99.9% uptime</p>
    </div>

    <ngm-dev-block-ui-tracker
      [data]="trackerData"
      class="mt-4 hidden w-full lg:flex"
    />
    <ngm-dev-block-ui-tracker
      [data]="trackerDataMedium"
      class="mt-3 hidden w-full sm:flex lg:hidden"
    />
    <ngm-dev-block-ui-tracker
      [data]="trackerDataSmall"
      class="mt-3 flex w-full sm:hidden"
    />

    <div
      class="mt-3 flex items-center justify-between text-sm text-gray-600 dark:text-gray-400"
    >
      <span class="hidden lg:block">90 days ago</span>
      <span class="hidden sm:block lg:hidden">60 days ago</span>
      <span class="sm:hidden">30 days ago</span>
      <span>Today</span>
    </div>

    <div class="mt-6 flex flex-wrap items-center gap-2">
      <span
        class="inline-flex items-center gap-x-2 rounded-md bg-surface-container px-2 py-0.5 text-sm text-gray-600 dark:text-gray-400"
        tabindex="0"
      >
        <span class="size-2 rounded-full bg-emerald-500"></span>
        Operational
      </span>
      <span
        class="inline-flex items-center gap-x-2 rounded-md bg-surface-container px-2 py-0.5 text-sm text-gray-600 dark:text-gray-400"
        tabindex="0"
      >
        <span class="size-2 rounded-full bg-red-500"></span>
        Downtime
      </span>
      <span
        class="inline-flex items-center gap-x-2 rounded-md bg-surface-container px-2 py-0.5 text-sm text-gray-600 dark:text-gray-400"
        tabindex="0"
      >
        <span class="size-2 rounded-full bg-gray-500"></span>
        Maintenance
      </span>
    </div>

    <mat-accordion class="mt-6">
      <mat-expansion-panel class="dark:border dark:border-outline-variant">
        <mat-expansion-panel-header>
          <mat-panel-title>Downtime overview (3)</mat-panel-title>
        </mat-expansion-panel-header>
        <ul
          class="mt-2 w-full divide-y divide-outline-variant text-sm text-gray-600 dark:text-gray-400"
        >
          <li class="flex w-full items-center justify-between py-2">
            <span>16 Jan, 2025</span>
            <span>Down for 1 min</span>
          </li>
          <li class="flex w-full items-center justify-between py-2">
            <span>8 Feb, 2025</span>
            <span>Down for 3 min</span>
          </li>
          <li class="flex w-full items-center justify-between py-2">
            <span>23 Mar, 2025</span>
            <span>Down for 2 min</span>
          </li>
        </ul>
      </mat-expansion-panel>
    </mat-accordion>
  </mat-card-content>
</mat-card>
