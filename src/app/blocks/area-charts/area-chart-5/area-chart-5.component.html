<!--
	Installed from https://ui.angular-material.dev/
	Update this file using `npx @ngm-dev/cli update area-charts/area-chart-5`
-->

<div class="mx-auto max-w-7xl">
  <mat-card appearance="outlined">
    <mat-card-header>
      <mat-card-title>{{ total | currency }}</mat-card-title>
      <mat-card-subtitle>Balance</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <!-- Desktop chart -->
      <div class="mt-8 h-60 relative" #chartImage>
        <!-- tooltip -->
        <div
          #tooltipElement
          [class]="
            'bg-surface rounded-md border border-outline-variant shadow-sm pointer-events-none min-w-40 absolute left-0 top-1 transition-all z-3 ' +
            (tooltip?.opacity === 1 ? 'opacity-100' : 'opacity-0')
          "
          [style.transform]="
            getTooltipTransform(
              tooltip?.caretX ?? 0,
              tooltipElement.offsetWidth,
              chartImage.offsetWidth
            )
          "
        >
          <h3 class="text-body-large font-medium my-2 px-3">
            {{ tooltip?.title?.[0] }}
          </h3>
          <mat-divider class="border-outline-variant!" />
          <div class="p-3">
            @for (item of tooltip?.dataPoints; track item; let i = $index) {
            <div class="flex items-center w-full justify-between gap-x-2">
              <div class="flex items-center space-x-2">
                <span
                  class="h-1 w-3 shrink-0 rounded-sm"
                  [style.background]="
                      tooltip?.labelColors?.[i]?.borderColor?.toString()
                    "
                  aria-hidden="true"
                ></span>
                <span class="text-body-medium font-body-small"
                  >{{ item?.dataset?.label }}</span
                >
              </div>
              <span class="text-body-medium font-medium text-right"
                >{{ Number(item?.raw) | currency }}</span
              >
            </div>
            }
          </div>
        </div>

        <canvas
          class="z-2 relative"
          baseChart
          [data]="chartData"
          [options]="chartOptions"
          [plugins]="chartPlugins"
          [type]="chartType"
        ></canvas>
      </div>
    </mat-card-content>

    <mat-card-actions>
      <div class="flex justify-between w-full flex-wrap gap-2">
        <span
          class="inline-flex select-none items-center rounded-md bg-white px-2 py-1 text-xs font-medium text-gray-900 ring-1 ring-inset ring-gray-200 dark:bg-gray-900 dark:text-gray-100 dark:ring-gray-600"
        >
          Team access
        </span>
        <div class="flex items-center gap-2 density-3 ml-auto">
          <button mat-button>
            View transactions
            <mat-icon>open_in_new</mat-icon>
          </button>
          <span
            class="hidden h-6 w-px bg-gray-200 dark:bg-gray-600 sm:block"
            aria-hidden="true"
          ></span>
          <button mat-button>
            View statements
            <mat-icon>open_in_new</mat-icon>
          </button>
        </div>
      </div>
    </mat-card-actions>
  </mat-card>
</div>
