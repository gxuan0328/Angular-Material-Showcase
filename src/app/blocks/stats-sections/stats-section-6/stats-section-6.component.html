<div class="relative py-16 md:py-24">
  <div
    class="absolute inset-0 bg-cover bg-center"
    style="
      background-image: url('https://placehold.co/1920x800/334155/e2e8f0');
      opacity: 0.1;
    "
  ></div>
  <div class="relative max-w-7xl mx-auto px-4 md:px-6 lg:px-8">
    <div class="text-center mb-12 md:mb-16">
      <h2 class="text-3xl font-bold tracking-tight md:text-4xl">
        Building the future together
      </h2>
    </div>
    <div class="grid grid-cols-1 gap-8 md:grid-cols-3">
      @for (stat of stats; track stat.id) {
      <div class="flex flex-col items-center text-center">
        <div
          class="flex h-16 w-16 items-center justify-center rounded-full bg-primary text-on-primary mb-4"
        >
          <mat-icon class="text-4xl w-10 h-10">{{ stat.icon }}</mat-icon>
        </div>
        <div class="text-4xl font-bold md:text-5xl">{{ stat.value }}</div>
        <div class="mt-2 text-lg font-medium">{{ stat.label }}</div>
      </div>
      }
    </div>
  </div>
</div>
