<div class="py-16 md:py-24 bg-surface-container-lowest">
  <div class="max-w-7xl mx-auto px-4 md:px-6 lg:px-8">
    <div class="text-center mb-12 md:mb-16">
      <h2 class="text-3xl font-bold tracking-tight md:text-4xl">
        Our impact in numbers
      </h2>
      <p class="mt-4 text-lg text-gray-600 dark:text-gray-400">
        See how we're making a difference for businesses worldwide
      </p>
    </div>
    <div class="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-4">
      @for (stat of stats; track stat.id) {
      <mat-card class="text-center">
        <mat-card-content class="pt-6">
          <div class="text-4xl font-bold md:text-5xl">{{ stat.value }}</div>
          <div class="mt-3 text-base font-medium">{{ stat.label }}</div>
          <div class="mt-2 text-sm text-gray-600 dark:text-gray-400">
            {{ stat.description }}
          </div>
        </mat-card-content>
      </mat-card>
      }
    </div>
  </div>
</div>
