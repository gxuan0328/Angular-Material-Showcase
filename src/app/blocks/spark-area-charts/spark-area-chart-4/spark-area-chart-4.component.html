<div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
  @for (item of summary; track item.name) {
  <mat-card appearance="outlined" role="listitem">
    <mat-card-content>
      <p class="text-sm text-gray-500 dark:text-gray-500">{{ item.name }}</p>
      <div class="flex items-center justify-between space-x-8">
        <p class="text-3xl font-semibold text-gray-900 dark:text-gray-50">
          {{ item.stat }}
        </p>
        <div class="flex-none h-16 w-28">
          <canvas
            baseChart
            [data]="item.chartData"
            [options]="chartOptions"
            [type]="chartType"
          ></canvas>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
  }
</div>
