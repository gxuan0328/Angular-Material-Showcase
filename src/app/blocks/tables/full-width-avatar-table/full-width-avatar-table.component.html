<div class="p-4 md:p-6">
  <h6 class="text-headline-small font-headline-small">Latest activity</h6>
</div>

<table
  mat-table
  [dataSource]="dataSource"
  class="mt-6 [&_th:first-child]:md:pl-6! [&_td:first-child]:md:pl-6! [&_th:last-child]:md:pr-6! [&_td:last-child]:md:pr-6!"
>
  <ng-container matColumnDef="user">
    <th mat-header-cell *matHeaderCellDef>User</th>
    <td mat-cell *matCellDef="let element">
      <div class="flex items-center gap-2">
        <img
          [src]="element.user.avatar"
          [alt]="element.user.name"
          class="size-8 rounded-full"
        />
        <span class="font-medium">{{ element.user.name }}</span>
      </div>
    </td>
  </ng-container>
  <ng-container matColumnDef="commit">
    <th mat-header-cell *matHeaderCellDef class="hidden md:table-cell">
      Commit
    </th>
    <td mat-cell *matCellDef="let element" class="hidden md:table-cell">
      <div class="flex items-center gap-2">
        <span class="text-gray-500 dark:text-gray-400"
          >{{ element.commit.hash }}</span
        >
        <mat-chip-set class="density-3">
          <mat-chip> {{ element.commit.branch }} </mat-chip>
        </mat-chip-set>
      </div>
    </td>
  </ng-container>
  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef class="text-right! sm:text-left!">
      Status
    </th>
    <td mat-cell *matCellDef="let element">
      <div class="flex items-center gap-2 justify-end sm:justify-start">
        <span class="inline sm:hidden text-gray-500 dark:text-gray-400"
          >{{ element.deployedAt }}</span
        >
        <div
          [class]="
            'p-1 rounded-full ' +
            (element.status === 'completed'
              ? 'bg-emerald-200/50 dark:bg-emerald-900/50'
              : 'bg-red-200/50 dark:bg-red-900/50')
          "
        >
          <div
            [class]="
              'size-1.5 rounded-full ' +
              (element.status === 'completed'
                ? 'bg-emerald-500 dark:bg-emerald-400'
                : 'bg-red-500 dark:bg-red-400')
            "
          ></div>
        </div>
        <span class="capitalize hidden sm:inline">{{ element.status }}</span>
      </div>
    </td>
  </ng-container>
  <ng-container matColumnDef="duration">
    <th mat-header-cell *matHeaderCellDef class="hidden md:table-cell">
      Duration
    </th>
    <td
      mat-cell
      *matCellDef="let element"
      class="text-gray-500 dark:text-gray-400 hidden md:table-cell"
    >
      {{ element.duration }}
    </td>
  </ng-container>
  <ng-container matColumnDef="deployedAt">
    <th
      mat-header-cell
      *matHeaderCellDef
      class="text-right! hidden sm:table-cell"
    >
      Deployed at
    </th>
    <td
      mat-cell
      *matCellDef="let element"
      class="text-gray-500 dark:text-gray-400 text-right! hidden sm:table-cell"
    >
      {{ element.deployedAt }}
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
