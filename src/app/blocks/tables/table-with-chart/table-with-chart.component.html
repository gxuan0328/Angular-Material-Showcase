<div class="w-full md:max-w-7xl mx-auto p-4 md:p-6">
  <div class="grid gap-4 grid-cols-1 md:grid-cols-2">
    <div class="flex flex-col gap-2">
      <h6 class="text-headline-small font-headline-small">Workspaces</h6>
      <p class="text-body-medium font-body-medium">
        Overview of all registered workspaces within your organization.
      </p>
    </div>
    <div class="flex md:justify-end gap-2 flex-wrap">
      <button matButton="filled">Add workspace</button>
    </div>
  </div>
  <table mat-table [dataSource]="dataSource" class="mt-6">
    @for (column of columns; track $index) {
    <ng-container [matColumnDef]="column.value">
      <th mat-header-cell *matHeaderCellDef [class]="column.thClass">
        {{ column.label }}
      </th>
      @if (column.value === 'apiRequests') {
      <td mat-cell *matCellDef="let element" [class]="column.tdClass">
        <div class="h-10 w-[200px]">
          <canvas
            baseChart
            [type]="'line'"
            [data]="element.apiRequests"
            [options]="chartOptions"
          >
          </canvas>
        </div>
      </td>
      } @else {
      <td mat-cell *matCellDef="let element" [class]="column.tdClass">
        {{ element[column.value] }}
      </td>
      }
    </ng-container>
    }

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
