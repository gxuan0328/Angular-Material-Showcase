<div class="mx-auto w-full max-w-7xl px-3 py-20">
  <div class="grid grid-cols-1 items-center gap-12 lg:grid-cols-2">
    <div class="flex flex-col">
      <span
        class="inline-block w-fit rounded-lg border border-violet-200/20 bg-violet-50/50 px-3 py-1.5 font-semibold uppercase leading-4 tracking-tighter dark:border-violet-800/30 dark:bg-violet-900/20 sm:text-sm"
      >
        <span
          class="bg-gradient-to-b from-violet-500 to-violet-600 bg-clip-text text-transparent dark:from-violet-200 dark:to-violet-400"
        >
          Why we're different
        </span>
      </span>
      <h2 class="mt-4 text-4xl font-bold tracking-tighter sm:text-5xl">
        Designed for today's workforce
      </h2>
      <p class="mt-6 text-lg leading-7 text-gray-600 dark:text-gray-400">
        Our platform adapts to your team's needs and evolves with your business.
        See the difference firsthand.
      </p>
      <div class="mt-10 space-y-8">
        @for (feature of features; track feature.title) {
        <div class="flex gap-4">
          <div
            class="flex size-12 shrink-0 items-center justify-center rounded-lg bg-violet-100 dark:bg-violet-900/30"
          >
            <mat-icon
              aria-hidden="true"
              class="text-violet-600! dark:text-violet-400! text-2xl!"
              >{{ feature.icon }}</mat-icon
            >
          </div>
          <div class="flex-1">
            <h3 class="text-xl font-semibold text-gray-900 dark:text-gray-50">
              {{ feature.title }}
            </h3>
            <p class="mt-2 text-gray-600 dark:text-gray-400">
              {{ feature.description }}
            </p>
          </div>
        </div>
        }
      </div>
    </div>
    <div
      class="relative aspect-[4/3] overflow-hidden rounded-2xl bg-gradient-to-br from-violet-100 via-violet-50 to-gray-100 dark:from-violet-900/50 dark:via-violet-800/30 dark:to-gray-900"
    >
      <div
        class="absolute inset-0 flex items-center justify-center text-violet-300/30 dark:text-violet-600/20"
      >
        <mat-icon class="text-[16rem]! size-[1em]!" aria-hidden="true"
          >dashboard</mat-icon
        >
      </div>
    </div>
  </div>
</div>
