<div class="mx-auto w-full max-w-6xl px-3 py-20">
  <div class="text-center">
    <p
      class="text-sm font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400"
    >
      Powering innovation
    </p>
    <h2
      class="mt-4 text-3xl font-bold tracking-tight text-gray-900 dark:text-gray-50 sm:text-4xl"
    >
      Trusted by forward-thinking companies
    </h2>
  </div>
  <div class="mt-12 grid grid-cols-2 gap-8 sm:grid-cols-3 lg:grid-cols-6">
    @for (brand of brands; track brand.name) {
    <div
      class="flex items-center justify-center rounded-lg border border-gray-200 bg-white p-6 shadow-sm transition-all hover:border-violet-300 hover:shadow-md dark:border-gray-800 dark:bg-gray-900 dark:hover:border-violet-700"
    >
      <div
        class="flex size-16 items-center justify-center rounded-lg bg-gray-100 text-2xl font-bold text-gray-600 dark:bg-gray-800 dark:text-gray-400"
      >
        {{ brand.logo }}
      </div>
    </div>
    }
  </div>
</div>
