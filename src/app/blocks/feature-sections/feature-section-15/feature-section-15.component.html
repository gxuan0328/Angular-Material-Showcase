<div class="mx-auto w-full max-w-6xl px-3 py-20">
  <div class="text-center">
    <span
      class="inline-block rounded-lg border border-violet-200/20 bg-violet-50/50 px-3 py-1.5 font-semibold uppercase leading-4 tracking-tighter dark:border-violet-800/30 dark:bg-violet-900/20 sm:text-sm"
    >
      <span
        class="bg-gradient-to-b from-violet-500 to-violet-600 bg-clip-text text-transparent dark:from-violet-200 dark:to-violet-400"
      >
        Our impact
      </span>
    </span>
    <h2 class="mt-4 text-4xl font-bold tracking-tighter sm:text-5xl">
      Trusted by leading organizations
    </h2>
    <p
      class="mx-auto mt-6 max-w-2xl text-lg leading-7 text-gray-600 dark:text-gray-400"
    >
      Join the growing community of companies that rely on us to drive their
      success.
    </p>
  </div>
  <div
    class="mt-16 grid grid-cols-2 gap-8 border-y border-gray-200 py-12 dark:border-gray-800 md:grid-cols-4"
  >
    @for (metric of metrics; track metric.label) {
    <div class="text-center">
      <div
        class="text-5xl font-bold tracking-tight text-gray-900 dark:text-gray-50 sm:text-6xl"
      >
        {{ metric.value }}
      </div>
      <div class="mt-2 text-lg font-semibold text-gray-900 dark:text-gray-50">
        {{ metric.label }}
      </div>
      <div class="mt-1 text-sm text-gray-600 dark:text-gray-400">
        {{ metric.description }}
      </div>
    </div>
    }
  </div>
</div>
