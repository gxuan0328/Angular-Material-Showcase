<div class="mx-auto w-full max-w-6xl px-3 py-20">
  <div class="text-center">
    <span
      class="inline-block rounded-lg border border-violet-200/20 bg-violet-50/50 px-3 py-1.5 font-semibold uppercase leading-4 tracking-tighter dark:border-violet-800/30 dark:bg-violet-900/20 sm:text-sm"
    >
      <span
        class="bg-gradient-to-b from-violet-500 to-violet-600 bg-clip-text text-transparent dark:from-violet-200 dark:to-violet-400"
      >
        Capabilities
      </span>
    </span>
    <h2 class="mt-4 text-4xl font-bold tracking-tighter sm:text-5xl">
      Tools that empower your team
    </h2>
    <p
      class="mx-auto mt-6 max-w-2xl text-lg leading-7 text-gray-600 dark:text-gray-400"
    >
      Discover powerful capabilities that streamline operations and accelerate
      growth for your organization.
    </p>
  </div>
  <div class="mt-16 grid grid-cols-1 gap-8 sm:grid-cols-2 lg:grid-cols-4">
    @for (feature of features; track feature.title) {
    <div
      class="group relative overflow-hidden rounded-2xl border border-gray-200 bg-white p-8 shadow-sm transition-all hover:border-violet-300 hover:shadow-lg dark:border-gray-800 dark:bg-gray-900 dark:hover:border-violet-700"
    >
      <div [class]="getIconContainerClasses(feature.color)">
        <mat-icon [class]="getIconClasses(feature.color)" aria-hidden="true"
          >{{ feature.icon }}</mat-icon
        >
      </div>
      <h3 class="mt-6 text-xl font-semibold text-gray-900 dark:text-gray-50">
        {{ feature.title }}
      </h3>
      <p class="mt-3 text-sm leading-6 text-gray-600 dark:text-gray-400">
        {{ feature.description }}
      </p>
    </div>
    }
  </div>
</div>
