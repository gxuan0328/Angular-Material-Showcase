<!-- Content Container -->
<div class="px-4 sm:px-6 lg:px-8 py-6 min-h-[200px]">
  <!-- Desktop & Tablet Layout -->
  @if ((isLessThanMD$ | async) === false) {
  <div class="flex items-center justify-between">
    <!-- Left side: Logo and Meta Info -->
    <div class="flex items-center space-x-4">
      <!-- Logo -->
      <div class="flex-shrink-0">
        <div
          class="size-12 rounded-full bg-surface-container-high flex items-center justify-center"
        >
          <img class="size-8" [src]="logoUrl" [alt]="companyName" />
        </div>
      </div>
      <!-- Meta Info -->
      <div>
        <p class="text-sm text-gray-600 dark:text-gray-400">
          {{ invoiceNumber }}
        </p>
        <h1 class="text-xl font-semibold">{{ companyName }}</h1>
      </div>
    </div>

    <!-- Right side: Action Buttons -->
    <div class="flex items-center space-x-3">
      @for (button of actionButtons; track button.label) { @if
      (button.isPrimary) {
      <button matButton="filled" (click)="button.action()">
        {{ button.label }}
      </button>
      } @else {
      <button matButton="outlined" (click)="button.action()">
        {{ button.label }}
      </button>
      } }
    </div>
  </div>
  } @else {
  <!-- Mobile Layout -->
  <div class="flex items-center justify-between">
    <!-- Left side: Logo and Meta Info -->
    <div class="flex items-center space-x-3">
      <!-- Logo -->
      <div class="flex-shrink-0">
        <div
          class="size-12 rounded-full bg-surface-container-high flex items-center justify-center"
        >
          <img class="size-8" [src]="logoUrl" [alt]="companyName" />
        </div>
      </div>
      <!-- Meta Info -->
      <div>
        <p class="text-sm text-gray-600 dark:text-gray-400">
          {{ invoiceNumber }}
        </p>
        <h1 class="text-lg font-semibold">{{ companyName }}</h1>
      </div>
    </div>

    <!-- Right side: Primary Action and Menu -->
    <div class="flex items-center space-x-2">
      <!-- Primary Action Button -->
      <button matButton="filled" (click)="onSend()">Send</button>

      <!-- Menu Button -->
      <button mat-icon-button [matMenuTriggerFor]="actionMenu">
        <mat-icon>more_vert</mat-icon>
      </button>

      <!-- Dropdown Menu -->
      <mat-menu #actionMenu="matMenu">
        <button mat-menu-item (click)="onCopyUrl()">Copy URL</button>
        <button mat-menu-item (click)="onEdit()">Edit</button>
      </mat-menu>
    </div>
  </div>
  }
</div>
