<!-- Content Container -->
<div class="px-4 sm:px-6 lg:px-8 py-6">
  <!-- Desktop & Tablet Layout -->
  @if ((isLessThanMD$ | async) === false) {
  <div class="flex items-center justify-between">
    <!-- Left side: Title and Filter Toggles -->
    <div class="flex items-center space-x-8">
      <!-- Page Title -->
      <h1 class="text-2xl font-bold">{{ pageTitle }}</h1>

      <!-- Filter Button Toggles -->
      <mat-button-toggle-group
        [value]="selectedFilter"
        (change)="onFilterChange($event.value)"
      >
        @for (tab of filterTabs; track tab.value) {
        <mat-button-toggle [value]="tab.value">
          {{ tab.label }}
        </mat-button-toggle>
        }
      </mat-button-toggle-group>
    </div>

    <!-- Right side: Action Button -->
    <div>
      <button matButton="filled" (click)="onNewInvoice()">
        <mat-icon>add</mat-icon>
        New invoice
      </button>
    </div>
  </div>
  } @else {
  <!-- Mobile Layout -->
  <div class="space-y-4">
    <!-- Header with Title and Action Button -->
    <div class="flex items-center justify-between">
      <h1 class="text-xl font-bold">{{ pageTitle }}</h1>
      <button matButton="filled" (click)="onNewInvoice()">
        <mat-icon>add</mat-icon>
        New invoice
      </button>
    </div>

    <!-- Filter Button Toggles (Full Width) -->
    <mat-button-toggle-group
      [value]="selectedFilter"
      (change)="onFilterChange($event.value)"
      class="density-3 w-full"
    >
      @for (tab of filterTabs; track tab.value) {
      <mat-button-toggle [value]="tab.value" class="flex-1">
        {{ tab.label }}
      </mat-button-toggle>
      }
    </mat-button-toggle-group>
  </div>
  }
</div>
