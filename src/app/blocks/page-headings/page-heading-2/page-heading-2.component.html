<div class="p-6">
  <div class="lg:flex lg:items-center lg:justify-between">
    <!-- Title and Meta Section -->
    <div class="min-w-0 flex-1">
      <h2
        class="text-2xl/7 font-bold sm:truncate sm:text-3xl sm:tracking-tight"
      >
        {{ jobTitle }}
      </h2>
    </div>

    <!-- Actions Section -->
    <div class="mt-5 flex lg:mt-0 lg:ml-4 space-x-3">
      @for (button of actionButtons; track button.label) { @if (button.variant
      === 'outlined') {
      <button type="button" matButton="outlined" (click)="button.action()">
        {{ button.label }}
      </button>
      } @else {
      <button type="button" matButton="filled" (click)="button.action()">
        {{ button.label }}
      </button>
      } }
    </div>
  </div>
</div>
