<div class="bg-white dark:bg-gray-900">
  <div class="mx-auto max-w-2xl px-6 py-24 sm:py-32 lg:px-8">
    <div class="text-center">
      <span
        class="material-icons mx-auto text-6xl text-blue-600 dark:text-blue-400"
        >mail</span
      >
      <h2
        class="mt-6 text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl dark:text-white"
      >
        Drop Us a Line
      </h2>
      <p class="mt-4 text-lg leading-8 text-gray-600 dark:text-gray-400">
        Have a question or want to work together? Send us a message and we'll
        respond as quickly as possible.
      </p>
    </div>

    <form class="mt-12 space-y-6">
      <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>First Name</mat-label>
          <input matInput type="text" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Last Name</mat-label>
          <input matInput type="text" required />
        </mat-form-field>
      </div>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Email</mat-label>
        <input matInput type="email" required />
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Subject</mat-label>
        <input matInput type="text" required />
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Message</mat-label>
        <textarea matInput rows="6" required></textarea>
      </mat-form-field>

      <div class="text-center">
        <button matButton="filled" type="submit" class="min-w-[200px]">
          Send Message
        </button>
        <p class="mt-4 text-sm text-gray-500 dark:text-gray-400">
          We'll get back to you within 24 hours.
        </p>
      </div>
    </form>

    <div class="mt-16 border-t border-gray-200 pt-8 dark:border-gray-700">
      <p class="text-center text-sm text-gray-600 dark:text-gray-400">
        Prefer email?
        <a
          href="mailto:info@company.com"
          class="font-semibold text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300"
        >
          info&#64;company.com
        </a>
      </p>
    </div>
  </div>
</div>
