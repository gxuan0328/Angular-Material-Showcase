<div class="bg-white dark:bg-gray-900">
  <div class="mx-auto max-w-7xl px-6 py-24 sm:py-32 lg:px-8">
    <div class="mx-auto max-w-2xl text-center">
      <h2
        class="text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl dark:text-white"
      >
        Contact Our Team
      </h2>
      <p class="mt-4 text-lg leading-8 text-gray-600 dark:text-gray-400">
        Choose the right department to get the fastest response
      </p>
    </div>

    <div class="mx-auto mt-16 max-w-5xl">
      <div class="grid grid-cols-1 gap-8 sm:grid-cols-2">
        @for (dept of departments; track dept.email) {
        <div
          class="rounded-2xl border border-gray-200 p-8 dark:border-gray-700"
        >
          <h3 class="text-xl font-semibold text-gray-900 dark:text-white">
            {{ dept.name }}
          </h3>
          <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
            {{ dept.description }}
          </p>
          <a
            [href]="'mailto:' + dept.email"
            class="mt-6 inline-flex items-center gap-2 text-sm font-semibold text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300"
          >
            {{ dept.email }}
            <span class="material-icons text-sm">arrow_forward</span>
          </a>
        </div>
        }
      </div>

      <div class="mt-16 rounded-2xl bg-gray-50 p-8 dark:bg-gray-800">
        <h3
          class="text-center text-xl font-semibold text-gray-900 dark:text-white"
        >
          Or send us a general inquiry
        </h3>
        <form class="mx-auto mt-8 max-w-xl space-y-6">
          <mat-form-field appearance="outline" class="w-full">
            <mat-label>Name</mat-label>
            <input matInput type="text" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-full">
            <mat-label>Email</mat-label>
            <input matInput type="email" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-full">
            <mat-label>Subject</mat-label>
            <input matInput type="text" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-full">
            <mat-label>Message</mat-label>
            <textarea matInput rows="4"></textarea>
          </mat-form-field>

          <button matButton="filled" type="submit" class="w-full">
            Send Message
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
