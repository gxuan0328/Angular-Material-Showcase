<div class="p-4">
  <h3 class="text-xl font-bold">Settings</h3>
  <p class="mt-2 text-base text-gray-600">
    Manage your personal details, workspace governance and notifications.
  </p>

  <mat-tab-group
    [selectedIndex]="selectedTabIndex"
    class="mt-6"
    mat-stretch-tabs="false"
    mat-align-tabs="start"
  >
    <mat-tab label="Account details" />
    <mat-tab label="Workspaces">
      <div class="mt-8 p-2">
        <h4 class="font-semibold">Workspace usage</h4>
        <p class="mt-1 text-base leading-6 text-gray-600">
          Overview of all activities of your workspace. Learn more about our
          <a
            href="#"
            class="text-primary inline-flex items-center gap-1 hover:underline hover:underline-offset-4"
          >
            upgrade options
            <mat-icon class="size-[1em]! [font-size:18px]!"
              >open_in_new</mat-icon
            >
          </a>
        </p>

        <div class="mt-6 grid grid-cols-1 gap-4 sm:max-w-3xl sm:grid-cols-2">
          @for (item of usage; track item) {
          <mat-card class="p-4 hover:bg-gray-50! dark:hover:bg-gray-800!">
            <mat-card-content>
              <p class="text-gray-600 dark:text-gray-400">
                {{ item.resource }}
              </p>
              <p class="mt-3 flex items-baseline gap-1">
                <span class="text-2xl font-semibold">{{ item.usage }}</span>
                <span class="text-gray-500 font-semibold"
                  >/{{ item.maximum }}</span
                >
              </p>
            </mat-card-content>
          </mat-card>
          }
        </div>
      </div>
    </mat-tab>
    <mat-tab label="Billing" />
  </mat-tab-group>
</div>
