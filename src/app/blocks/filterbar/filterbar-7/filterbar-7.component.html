<div class="relative p-4">
  <div
    class="flex h-48 flex-wrap items-start justify-between rounded-corner-medium border border-outline-variant p-6 shadow-sm"
  >
    <!-- Date range buttons - desktop only -->
    <div class="items-center sm:inline-flex">
      <mat-button-toggle-group [(value)]="selectedDateOption">
        @for (option of dateOptions; track option.value) {
        <mat-button-toggle
          [value]="option.value"
          [matTooltip]="option.tooltipText"
          matTooltipPosition="above"
        >
          {{ option.buttonText }}
        </mat-button-toggle>
        }
      </mat-button-toggle-group>
    </div>

    <!-- Column visibility select -->
    <mat-form-field appearance="outline" class="w-full sm:w-52 density-3">
      <mat-select [(ngModel)]="selectedColumns" multiple>
        <mat-select-trigger>
          <div class="relative pl-8">
            <mat-icon class="absolute! top-0 left-0">tune</mat-icon>
            View ({{ selectedColumns.length }})
          </div>
        </mat-select-trigger>
        @for (option of columnOptions; track option.value) {
        <mat-option [value]="option.value" class="min-h-[36px]!">
          {{ option.label }}
        </mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>

  <!-- gradient for demo purpose -->
  <div
    class="absolute inset-x-0 bottom-0 -mb-1 h-14 rounded-b-corner-medium bg-gradient-to-t from-surface via-surface to-transparent"
  ></div>
</div>
