<form [formGroup]="form" class="p-4 max-w-7xl mx-auto">
  <mat-card appearance="outlined">
    <mat-card-content>
      <div class="grid md:grid-cols-2 gap-6">
        <div class="flex flex-col space-y-4 p-4">
          <img
            src="https://ui.angular-material.dev/app-ui/logo.svg"
            alt="Logo"
            height="48"
            width="48"
            class="inline"
          />
          <h1 class="text-3xl">Sign in</h1>
          <p>to continue to Application</p>
        </div>
        <div class="flex flex-col space-y-4 p-4">
          <mat-form-field class="w-full">
            <mat-label>Email</mat-label>
            <input matInput type="email" formControlName="email" />
            @if ( (form.get('email')?.touched || form.get('email')?.dirty) &&
            form.get('email')?.hasError('email') ) {
            <mat-error>
              <mat-icon class="form-field-error-icon">error</mat-icon>
              Email is invalid
            </mat-error>
            }
          </mat-form-field>
          <button matButton="filled" class="w-full">Continue with email</button>
          <div class="flex py-5 items-center">
            <div class="flex-grow h-px bg-outline-variant"></div>
            <span class="flex-shrink mx-4">OR</span>
            <div class="flex-grow h-px bg-outline-variant"></div>
          </div>
          <button matButton="outlined" class="w-full">
            <mat-icon svgIcon="google" />
            Continue with Google
          </button>
          <button matButton="outlined" class="w-full">
            <mat-icon svgIcon="twitter" />
            Continue with Twitter
          </button>
          <button matButton="outlined" class="w-full">
            <mat-icon svgIcon="github" />
            Continue with GitHub
          </button>
        </div>
      </div>
    </mat-card-content>
    <mat-card-actions align="end" class="density-3">
      <span class="text-sm">Having issues?</span>
      <a matButton>Contact us</a>
    </mat-card-actions>
  </mat-card>
</form>
