<div class="bg-white dark:bg-gray-900">
  <div class="mx-auto max-w-7xl px-6 py-24 sm:py-32 lg:px-8">
    <div class="mx-auto max-w-2xl text-center">
      <h2
        class="text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl dark:text-white"
      >
        Technical insights
      </h2>
      <p class="mt-4 text-lg leading-8 text-gray-600 dark:text-gray-400">
        In-depth articles from our engineering team
      </p>
    </div>
    <div class="mx-auto mt-16 max-w-2xl lg:max-w-4xl">
      <div class="space-y-16">
        @for (post of posts; track post.id) {
        <article class="flex flex-col gap-8 lg:flex-row">
          <div class="relative w-full lg:w-64 lg:flex-shrink-0">
            <img
              [src]="post.imageUrl"
              [alt]="post.title"
              class="aspect-[16/9] w-full rounded-2xl bg-gray-100 object-cover lg:aspect-[2/3] dark:bg-gray-800"
            />
            <div
              class="absolute inset-0 rounded-2xl ring-1 ring-inset ring-gray-900/10"
            ></div>
          </div>
          <div class="flex-1">
            <div class="flex items-center gap-x-4 text-xs">
              <time
                [dateTime]="post.date"
                class="text-gray-500 dark:text-gray-400"
              >
                {{ post.date }}
              </time>
              <span
                class="relative z-10 rounded-full bg-gray-100 px-3 py-1.5 font-medium text-gray-600 hover:bg-gray-200 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700"
              >
                {{ post.category }}
              </span>
            </div>
            <div class="group relative max-w-xl">
              <h3
                class="mt-3 text-xl font-semibold leading-7 text-gray-900 group-hover:text-gray-600 dark:text-white dark:group-hover:text-gray-300"
              >
                <a href="#">
                  <span class="absolute inset-0"></span>
                  {{ post.title }}
                </a>
              </h3>
              <p
                class="mt-4 text-sm leading-6 text-gray-600 dark:text-gray-400"
              >
                {{ post.excerpt }}
              </p>
            </div>
            <div class="mt-6 flex items-center gap-x-4">
              <div class="text-sm leading-6">
                <p class="font-semibold text-gray-900 dark:text-white">
                  {{ post.author }}
                </p>
                <p class="text-gray-600 dark:text-gray-400">
                  {{ post.authorRole }}
                </p>
              </div>
            </div>
            <div
              class="mt-4 flex items-center gap-x-4 text-sm text-gray-600 dark:text-gray-400"
            >
              <div class="flex items-center gap-x-2">
                <mat-icon class="h-4 w-4">schedule</mat-icon>
                <span>{{ post.readTime }}</span>
              </div>
              <a
                href="#"
                class="flex items-center gap-x-2 font-semibold text-primary hover:text-primary/80"
              >
                <span>Continue reading</span>
                <mat-icon class="h-4 w-4">arrow_forward</mat-icon>
              </a>
            </div>
          </div>
        </article>
        }
      </div>
    </div>
  </div>
</div>
