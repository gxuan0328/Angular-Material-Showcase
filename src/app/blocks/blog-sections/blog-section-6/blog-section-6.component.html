<div class="bg-white dark:bg-gray-900">
  <div class="mx-auto max-w-7xl px-6 py-24 sm:py-32 lg:px-8">
    <div class="mx-auto max-w-2xl text-center">
      <h2
        class="text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl dark:text-white"
      >
        Developer resources
      </h2>
      <p class="mt-4 text-lg leading-8 text-gray-600 dark:text-gray-400">
        Practical guides and tutorials for building better software
      </p>
    </div>
    <div
      class="mx-auto mt-16 grid max-w-2xl grid-cols-1 gap-8 lg:mx-0 lg:max-w-none lg:grid-cols-3"
    >
      @for (post of posts; track post.id) {
      <article
        class="flex flex-col overflow-hidden rounded-2xl bg-white shadow-sm ring-1 ring-gray-200 dark:bg-gray-800 dark:ring-gray-700"
      >
        <div class="relative w-full">
          <img
            [src]="post.imageUrl"
            [alt]="post.title"
            class="aspect-[16/9] w-full bg-gray-100 object-cover dark:bg-gray-800"
          />
          <div
            class="absolute left-4 top-4 rounded-lg bg-white/90 px-3 py-1.5 text-xs font-semibold text-gray-900 backdrop-blur dark:bg-gray-900/90 dark:text-white"
          >
            {{ post.category }}
          </div>
        </div>
        <div class="flex flex-1 flex-col p-6">
          <div class="flex-1">
            <div class="group relative">
              <h3
                class="text-lg font-semibold leading-6 text-gray-900 group-hover:text-gray-600 dark:text-white dark:group-hover:text-gray-300"
              >
                <a href="#">
                  <span class="absolute inset-0"></span>
                  {{ post.title }}
                </a>
              </h3>
              <p
                class="mt-3 text-sm leading-6 text-gray-600 dark:text-gray-400"
              >
                {{ post.excerpt }}
              </p>
            </div>
          </div>
          <div class="mt-6 flex items-center gap-x-3">
            <img
              [src]="post.authorImage"
              [alt]="post.author"
              class="h-10 w-10 rounded-full bg-gray-100 dark:bg-gray-700"
            />
            <div class="flex-1 text-sm leading-6">
              <p class="font-semibold text-gray-900 dark:text-white">
                {{ post.author }}
              </p>
              <p class="text-gray-600 dark:text-gray-400">{{ post.date }}</p>
            </div>
          </div>
          <div
            class="mt-4 flex items-center gap-x-4 border-t border-gray-200 pt-4 text-sm text-gray-600 dark:border-gray-700 dark:text-gray-400"
          >
            <div class="flex items-center gap-x-1">
              <mat-icon class="h-4 w-4">visibility</mat-icon>
              <span>{{ post.views }}</span>
            </div>
            <div class="flex items-center gap-x-1">
              <mat-icon class="h-4 w-4">chat_bubble_outline</mat-icon>
              <span>{{ post.comments }}</span>
            </div>
          </div>
        </div>
      </article>
      }
    </div>
  </div>
</div>
