<div class="bg-white dark:bg-gray-900">
  <div class="mx-auto max-w-7xl px-6 py-24 sm:py-32 lg:px-8">
    <div class="mx-auto max-w-2xl lg:max-w-4xl">
      <h2
        class="text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl dark:text-white"
      >
        Engineering blog
      </h2>
      <p class="mt-4 text-lg leading-8 text-gray-600 dark:text-gray-400">
        Tutorials, guides, and technical deep dives
      </p>
    </div>
    <div
      class="mx-auto mt-16 grid max-w-2xl grid-cols-1 gap-x-8 gap-y-12 lg:mx-0 lg:max-w-none lg:grid-cols-2"
    >
      @for (post of posts; track post.id) {
      <article class="flex flex-col">
        <div class="relative w-full">
          <img
            [src]="post.imageUrl"
            [alt]="post.title"
            class="aspect-[16/9] w-full rounded-2xl bg-gray-100 object-cover dark:bg-gray-800"
          />
          <div
            class="absolute inset-0 rounded-2xl ring-1 ring-inset ring-gray-900/10"
          ></div>
        </div>
        <div class="flex-1">
          <mat-chip-set class="mt-4">
            @for (tag of post.tags; track tag) {
            <mat-chip>{{ tag }}</mat-chip>
            }
          </mat-chip-set>
          <div class="group relative max-w-xl">
            <h3
              class="mt-4 text-lg font-semibold leading-6 text-gray-900 group-hover:text-gray-600 dark:text-white dark:group-hover:text-gray-300"
            >
              <a href="#">
                <span class="absolute inset-0"></span>
                {{ post.title }}
              </a>
            </h3>
            <p class="mt-4 text-sm leading-6 text-gray-600 dark:text-gray-400">
              {{ post.excerpt }}
            </p>
          </div>
          <div class="mt-6 flex items-center justify-between">
            <div class="flex items-center gap-x-4 text-xs">
              <time
                [dateTime]="post.date"
                class="text-gray-500 dark:text-gray-400"
              >
                {{ post.date }}
              </time>
              <span class="text-gray-500 dark:text-gray-400">·</span>
              <span class="text-gray-500 dark:text-gray-400">
                {{ post.readTime }}
              </span>
            </div>
          </div>
          <div class="mt-4 border-t border-gray-200 pt-4 dark:border-gray-800">
            <div class="text-sm">
              <span class="text-gray-600 dark:text-gray-400">By </span>
              <span class="font-semibold text-gray-900 dark:text-white">
                {{ post.author }}
              </span>
            </div>
          </div>
        </div>
      </article>
      }
    </div>
  </div>
</div>
