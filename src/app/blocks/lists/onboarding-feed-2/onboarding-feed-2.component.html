<div class="sm:mx-auto sm:max-w-lg p-4">
  <h3 class="text-xl font-semibold">Getting started</h3>
  <p class="mt-1 text-base leading-6 text-gray-600 dark:text-gray-400">
    Follow the steps to set up your workspace. This allows you to create your
    first dashboard.
  </p>
  <ul class="mt-6 space-y-4 list-none p-0">
    @for (step of steps; track step.id) {
    <li class="rounded-lg border border-outline-variant bg-surface p-4">
      <div>
        <div class="flex items-center gap-3 text-base">
          @if (step.status === 'complete') {
          <mat-icon class="text-primary! shrink-0 icon-filled"
            >check_circle</mat-icon
          >
          } @else {
          <span
            class="flex size-6 items-center justify-center font-medium text-gray-600 dark:text-gray-400"
          >
            {{ step.id }}
          </span>
          }
          <h3 class="font-medium">{{ step.title }}</h3>
        </div>
        <p
          class="mt-2 text-base leading-6 text-gray-600 dark:text-gray-400 mb-0 pl-9"
        >
          {{ step.description }}
        </p>
      </div>
    </li>
    }
  </ul>
  <div class="mt-8 flex items-center justify-end gap-4">
    <button matButton="outlined">Back</button>
    <button matButton="filled">Continue</button>
  </div>
</div>
