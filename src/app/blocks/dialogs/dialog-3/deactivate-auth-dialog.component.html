<form [formGroup]="deactivateForm" (ngSubmit)="onSubmit()">
  <h2 mat-dialog-title>Deactivate two-step authentication</h2>
  <mat-dialog-content>
    <p class="mt-2">
      Enter your password to deactivate the two-step authentication login. Make
      sure to have your smartphone ready.
    </p>
    <mat-form-field appearance="outline" class="w-full mb-4 mt-6">
      <mat-label>Email</mat-label>
      <input
        matInput
        type="email"
        formControlName="email"
        placeholder="emma@company.com"
      />
    </mat-form-field>
    <mat-form-field appearance="outline" class="w-full mb-4!">
      <mat-label>Confirm password</mat-label>
      <input
        matInput
        type="password"
        formControlName="password"
        placeholder="Password"
      />
    </mat-form-field>
  </mat-dialog-content>
  <mat-divider />
  <mat-dialog-actions>
    <button type="button" matButton mat-dialog-close class="text-on-surface!">
      Cancel
    </button>
    <button type="submit" matButton="filled" color="warn">Deactivate</button>
  </mat-dialog-actions>
</form>
