<div class="max-w-4xl mx-auto p-6">
  <!-- Header -->
  <div class="mb-8">
    <h2 class="text-2xl font-semibold mb-2">Account Settings</h2>
    <p class="text-gray-600 dark:text-gray-400">
      Manage your team members and their account permissions here
    </p>
  </div>

  <!-- Tabs -->
  <mat-tab-group
    mat-stretch-tabs="false"
    mat-align-tabs="start"
    [selectedIndex]="1"
  >
    @for (tab of tabs; track tab.id) {
    <mat-tab [label]="tab.label">
      @if (tab.id === 'users') {
      <!-- Users Tab -->
      <div class="py-6">
        <!-- Actions -->
        <div class="flex justify-between items-center mb-6">
          <div>
            <h3 class="text-lg font-medium">Team members</h3>
            <p class="text-gray-600 dark:text-gray-400">
              Manage your team members and their permissions.
            </p>
          </div>
          <button matButton="filled">
            <mat-icon class="mr-2">add</mat-icon>
            Add member
          </button>
        </div>

        <!-- Table -->
        <div class="overflow-x-auto">
          <table mat-table [dataSource]="users" class="w-full">
            <!-- Member Column -->
            <ng-container matColumnDef="member">
              <th
                mat-header-cell
                *matHeaderCellDef
                class="!text-gray-600 dark:text-gray-400 font-medium"
              >
                Member
              </th>
              <td mat-cell *matCellDef="let user">
                <div class="flex items-center gap-3">
                  <avvvatars [value]="user.name" [size]="32" [borderSize]="0" />
                  <span class="font-medium">{{ user.name }}</span>
                </div>
              </td>
            </ng-container>

            <!-- Users Column -->
            <ng-container matColumnDef="users">
              <th
                mat-header-cell
                *matHeaderCellDef
                class="!text-gray-600 dark:text-gray-400 font-medium"
              >
                Email
              </th>
              <td
                mat-cell
                *matCellDef="let user"
                class="text-gray-600 dark:text-gray-400"
              >
                {{ user.email }}
              </td>
            </ng-container>

            <!-- Role Column -->
            <ng-container matColumnDef="role">
              <th
                mat-header-cell
                *matHeaderCellDef
                class="!text-gray-600 dark:text-gray-400 font-medium"
              >
                Role
              </th>
              <td mat-cell *matCellDef="let user">
                <div
                  [ngClass]="{
                        'text-primary': user.role === 'Admin',
                        'text-tertiary': user.role === 'Guest',
                        'text-secondary': user.role === 'Member',
                      }"
                >
                  {{ user.role }}
                </div>
              </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef></th>
              <td mat-cell *matCellDef="let user">
                <button matButton>Edit</button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>
        </div>
      </div>
      }
    </mat-tab>
    }
  </mat-tab-group>
</div>
