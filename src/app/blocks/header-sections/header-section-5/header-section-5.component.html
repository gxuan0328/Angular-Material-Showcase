<div class="mx-auto w-full max-w-7xl px-6 py-16 sm:py-24 lg:px-8">
  <div class="grid gap-12 lg:grid-cols-12 lg:gap-8">
    <div class="lg:col-span-7">
      <div
        class="inline-flex items-center gap-2 rounded-full border border-outline-variant px-4 py-2"
      >
        <span class="relative flex h-2 w-2">
          <span
            class="absolute inline-flex h-full w-full animate-ping rounded-full bg-green-400 opacity-75"
          ></span>
          <span
            class="relative inline-flex h-2 w-2 rounded-full bg-green-500"
          ></span>
        </span>
        <span class="text-sm font-medium">Live and Ready</span>
      </div>
      <h1
        class="mt-6 text-4xl font-bold tracking-tight sm:text-5xl lg:text-6xl"
      >
        Enterprise Solutions
        <br />
        Built for Scale
      </h1>
      <p class="mt-6 text-lg leading-8 text-gray-600 dark:text-gray-400">
        Trusted by Fortune 500 companies to handle mission-critical workloads.
        Our infrastructure scales seamlessly from startup to enterprise.
      </p>
      <div class="mt-10 flex flex-wrap gap-4">
        <button mat-flat-button>Request a Quote</button>
        <button mat-stroked-button>
          <mat-icon>description</mat-icon>
          Case Studies
        </button>
      </div>
      <div class="mt-12">
        <p class="text-sm font-semibold text-gray-900 dark:text-gray-100">
          Trusted by industry leaders
        </p>
        <div class="mt-6 grid grid-cols-3 gap-6 sm:grid-cols-6">
          @for (logo of logos; track logo) {
          <div class="flex items-center justify-center">
            <img
              [src]="logo"
              alt="Company Logo"
              class="h-10 w-auto opacity-60 grayscale hover:opacity-100 hover:grayscale-0"
            />
          </div>
          }
        </div>
      </div>
    </div>
    <div class="lg:col-span-5">
      <div
        class="relative h-full min-h-[400px] overflow-hidden rounded-2xl bg-gradient-to-br from-primary/20 to-secondary/20"
      >
        <img
          src="https://placehold.co/600x700/6366f1/white?text=Enterprise+Solution"
          alt="Enterprise Solution"
          class="h-full w-full object-cover"
        />
      </div>
    </div>
  </div>
</div>
